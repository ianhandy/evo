<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velothrix aurantis — Ecosystem Observation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<style>
:root {
  --bg: #241200;
  --bg-dark: #1A0D00;
  --gold: #DDC165;
  --gold-light: #FFE9A3;
  --orange: #E5591C;
  --text: #e8d5c0;
  --dim: #8a7560;
  --card: #2a1800;
  --card-hover: #331e00;
  --border: #3d2a10;
  --velothrix: #DDC165;
  --leviathan: #C0392B;
  --crawler: #2ECC71;
  --crab: #E5591C;
  --worm: #9B59B6;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOADING SCREEN ── */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  gap: 20px;
}
#loader h1 {
  font-family: var(--sans);
  font-size: 28px; font-weight: 800;
  color: var(--gold);
}
#loader p {
  color: var(--dim);
  font-size: 13px;
}
.loader-bar {
  width: 200px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%; width: 0%;
  background: var(--gold);
  transition: width 0.3s;
}

/* ── LAYOUT ── */
#app {
  display: none;
  height: 100vh;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr auto;
}

/* ── HEADER ── */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
#header h1 {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
  white-space: nowrap;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-controls button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
}
.header-controls button:hover { background: var(--card-hover); }
.header-controls button.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}
#gen-counter {
  color: var(--dim);
  font-size: 11px;
  margin-left: auto;
  white-space: nowrap;
}
#gen-counter span { color: var(--gold-light); }

/* ── SPECIES TABS ── */
.species-tabs {
  display: flex;
  gap: 2px;
  margin-left: 16px;
}
.species-tab {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
}
.species-tab:hover { color: var(--text); }
.species-tab.active {
  border-color: var(--gold);
  color: var(--gold);
}

/* ── MAP AREA ── */
#map-area {
  position: relative;
  overflow: hidden;
  background: var(--bg-dark);
}
#map-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── EVENT FEED OVERLAY ── */
#event-feed {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  max-height: 120px;
  overflow-y: auto;
  background: linear-gradient(transparent, rgba(26,13,0,0.95));
  padding: 40px 12px 8px;
  pointer-events: none;
}
#event-feed div {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
  pointer-events: auto;
}
#event-feed div .ev-gen { color: var(--gold); }
#event-feed div .ev-text { color: var(--text); }

/* ── RIGHT PANEL ── */
#panel {
  background: var(--bg-dark);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
}
.panel-section h3 {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panel-toggle {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}
.panel-toggle button {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 6px;
  cursor: pointer;
  border-radius: 2px;
}
.panel-toggle button.active {
  background: var(--card-hover);
  color: var(--gold);
  border-color: var(--gold);
}

/* ── SPECIES ROWS ── */
.species-row {
  display: flex;
  align-items: center;
  padding: 4px 0;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.species-row:last-child { border-bottom: none; }
.species-variant {
  padding-left: 16px;
  border-bottom: none;
}
.species-variant + .species-variant { padding-top: 0; }
.sp-variant-name { font-style: italic; font-size: 9px; }
.sp-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sp-name {
  flex: 1;
  font-size: 10px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sp-pop {
  font-size: 10px;
  color: var(--dim);
  text-align: right;
  min-width: 40px;
}
.sp-trait {
  font-size: 10px;
  color: var(--gold);
  text-align: right;
  min-width: 40px;
}

/* ── CHART CANVASES ── */
.chart-canvas {
  width: 100%;
  height: 120px;
  display: block;
}
.chart-canvas.tall {
  height: 160px;
}

/* ── SCATTER CONTROLS ── */
.scatter-controls {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 6px;
}
.scatter-mode-toggle {
  display: flex;
  gap: 2px;
}
.scatter-mode-toggle button {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 0;
  cursor: pointer;
  border-radius: 2px;
}
.scatter-mode-toggle button.active {
  color: var(--gold);
  border-color: var(--gold);
  background: var(--bg-dark);
}
.scatter-axes {
  display: flex;
  gap: 8px;
}
.scatter-axes label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--dim);
  flex: 1;
}
.scatter-axes select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 9px;
  padding: 2px 4px;
  border-radius: 2px;
  min-width: 0;
}

/* ── EVENT LOG ── */
#event-log {
  grid-column: 1 / -1;
  background: var(--bg-dark);
  border-top: 1px solid var(--border);
  max-height: 140px;
  overflow-y: auto;
  padding: 6px 12px;
}
#event-log .log-entry {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
}
#event-log .log-entry .ev-gen { color: var(--gold); }
#event-log .log-entry .ev-text { color: var(--text); }
#event-log .log-entry.speciation-event {
  background: rgba(221,193,101,0.1);
  border-left: 3px solid var(--gold);
  padding: 4px 8px;
  margin: 4px 0;
  font-size: 11px;
}
#event-log .log-entry.speciation-event .ev-gen { color: #FFE9A3; font-weight: 700; }
#event-log .log-entry.speciation-event .ev-text { color: var(--gold-light); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── FOLDER TAB (hidden on desktop) ── */
.tray-tab { display: none; }

/* ── MOBILE LAYOUT ── */
@media (max-width: 768px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }

  #header {
    flex-wrap: wrap;
    padding: 8px 10px;
    gap: 6px;
  }

  #header h1 {
    font-size: 16px;
  }

  .species-tabs {
    order: 3;
    margin-left: 0;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .species-tabs::-webkit-scrollbar { display: none; }

  .header-controls {
    margin-left: auto;
  }

  #gen-counter {
    order: 2;
    margin-left: 0;
  }

  #map-area {
    min-height: 0;
  }

  /* Panel becomes a bottom tray */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 60vh;
    overflow-y: auto;
    background: rgba(26,13,0,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #panel.tray-open {
    transform: translateY(0);
  }

  .chart-canvas {
    height: 100px;
  }
  .chart-canvas.tall {
    height: 130px;
  }

  #event-log {
    grid-column: 1;
    max-height: 100px;
  }

  #event-feed {
    max-height: 80px;
  }

  /* Folder tab */
  .tray-tab {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 101;
    background: rgba(26,13,0,0.95);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 10px 24px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: bottom 0.3s ease, background 0.2s;
    font-family: var(--mono);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
    min-width: 120px;
  }
  .tray-tab:active {
    background: rgba(229,89,28,0.2);
  }
  .tray-tab-label {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .tray-tab-chevron {
    font-size: 12px;
    color: var(--dim);
    transition: transform 0.3s ease;
    line-height: 1;
  }
  .tray-tab.tab-active .tray-tab-chevron {
    transform: rotate(180deg);
  }
}

@media (max-width: 420px) {
  body { font-size: 11px; }

  #header h1 { font-size: 14px; }

  .header-controls button {
    padding: 4px 7px;
    font-size: 10px;
  }

  .species-tab {
    font-size: 9px;
    padding: 3px 6px;
  }

  .panel-section {
    padding: 8px;
  }

  .panel-section h3 {
    font-size: 11px;
  }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>VELOTHRIX</h1>
  <p>Loading Pyodide runtime...</p>
  <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
  <p id="loader-hint" style="color:#5a4a30;font-size:11px;margin-top:8px;display:none">First load downloads ~10 MB — may take a moment on mobile</p>
</div>
<script>setTimeout(function(){ var h = document.getElementById('loader-hint'); if (h) h.style.display = 'block'; }, 3000);</script>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <h1>VELOTHRIX</h1>
    <div class="species-tabs" id="species-tabs"></div>
    <div class="header-controls">
      <button id="btn-play" onclick="togglePlay()">&#9654; Play</button>
      <button onclick="setSpeed(1)" class="speed-btn active" data-speed="1">1x</button>
      <button onclick="setSpeed(5)" class="speed-btn" data-speed="5">5x</button>
      <button onclick="setSpeed(20)" class="speed-btn" data-speed="20">20x</button>
      <button onclick="setSpeed(100)" class="speed-btn" data-speed="100">100x</button>
    </div>
    <div id="gen-counter">Gen <span id="gen-num">0</span></div>
  </div>

  <!-- MAP -->
  <div id="map-area">
    <canvas id="map-canvas"></canvas>
    <div id="event-feed"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="panel">
    <div class="panel-section">
      <h3 id="panel-title">Global Overview</h3>
      <div class="panel-toggle">
        <button class="active" onclick="setPanelMode('global')">Global</button>
        <button onclick="setPanelMode('tile')">Selected Tile</button>
      </div>
      <div id="species-list"></div>
    </div>

    <div class="panel-section">
      <h3>Population Trends</h3>
      <canvas class="chart-canvas tall" id="pop-chart"></canvas>
    </div>

    <div class="panel-section">
      <h3 id="trait-title">Trait Distribution</h3>
      <canvas class="chart-canvas" id="trait-chart"></canvas>
    </div>

    <div class="panel-section">
      <h3>Scatter Plot</h3>
      <div class="scatter-controls">
        <div class="scatter-mode-toggle">
          <button class="active" onclick="setScatterMode('spatial')">Spatial</button>
          <button onclick="setScatterMode('temporal')">Temporal</button>
        </div>
        <div class="scatter-axes">
          <label>X <select id="scatter-x"></select></label>
          <label>Y <select id="scatter-y"></select></label>
        </div>
      </div>
      <canvas class="chart-canvas tall" id="scatter-chart"></canvas>
    </div>
  </div>

  <!-- EVENT LOG -->
  <div id="event-log">
    <div class="log-entry"><span class="ev-gen">[System]</span> <span class="ev-text">Ecosystem initializing...</span></div>
  </div>
</div>

<script>
// ── GLOBALS ──
let pyodide = null;
let playing = false;
let speed = 1;
let selectedSpecies = 0; // index into SPECIES
let panelMode = 'global';
let selectedTile = null; // {r, c} or null
let popHistory = []; // [{gen, pops: [5 numbers]}]
let mapCanvas, mapCtx;
let popCanvas, popCtx;
let traitCanvas, traitCtx;
let scatterCanvas, scatterCtx;
let scatterMode = 'spatial'; // 'spatial' or 'temporal'
let animFrame = null;
let stepsPerFrame = 1;

// ── ISOMETRIC CAMERA ──
let camTilt = 0.5;    // 0.25 = nearly flat, 0.75 = steep
let camZoom = 1.0;
let camPanX = 0;
let camPanY = 0;
let isDragging = false;
let dragLastX = 0;
let dragLastY = 0;

const SPECIES = [
  { name: 'Velothrix', fullName: 'Velothrix aurantis', color: '#DDC165', trait: 'Crest Brightness', variantColor: '#CC8833' },
  { name: 'Leviathan', fullName: 'Kelp Leviathan', color: '#C0392B', trait: 'Hunting Range', variantColor: '#E06040' },
  { name: 'Crawler', fullName: 'Reed Crawler', color: '#2ECC71', trait: 'Burrowing Depth', variantColor: '#1A9050' },
  { name: 'Crab', fullName: 'Tidal Crab', color: '#E5591C', trait: 'Shell Thickness', variantColor: '#CC9944' },
  { name: 'Worm', fullName: 'Bioluminescent Worm', color: '#9B59B6', trait: 'Glow Intensity', variantColor: '#6E3FA0' }
];

const MAX_HISTORY = 200;

// ── INIT ──
async function init() {
  const fill = document.getElementById('loader-fill');
  const loaderMsg = document.querySelector('#loader p');
  fill.style.width = '20%';

  try {
    loaderMsg.textContent = 'Downloading Pyodide runtime (~10 MB)...';
    pyodide = await loadPyodide();
    fill.style.width = '50%';

    loaderMsg.textContent = 'Initializing ecosystem simulation...';
    await pyodide.runPythonAsync(SIM_CODE);
    fill.style.width = '80%';

    loaderMsg.textContent = 'Setting up interface...';
    setupUI();
    fill.style.width = '100%';

    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      resizeCanvases();
      renderAll();
    }, 300);
  } catch (err) {
    console.error('Init failed:', err);
    loaderMsg.textContent = 'Failed to load: ' + (err.message || err);
    loaderMsg.style.color = '#E5591C';
    fill.style.width = '100%';
    fill.style.background = '#E5591C';
  }
}

function setupUI() {
  // Species tabs
  const tabsEl = document.getElementById('species-tabs');
  SPECIES.forEach((sp, i) => {
    const btn = document.createElement('button');
    btn.className = 'species-tab' + (i === 0 ? ' active' : '');
    btn.textContent = sp.name;
    btn.style.borderColor = i === selectedSpecies ? sp.color : '';
    btn.onclick = () => selectSpecies(i);
    tabsEl.appendChild(btn);
  });

  // Canvases
  mapCanvas = document.getElementById('map-canvas');
  mapCtx = mapCanvas.getContext('2d');
  popCanvas = document.getElementById('pop-chart');
  popCtx = popCanvas.getContext('2d');
  traitCanvas = document.getElementById('trait-chart');
  traitCtx = traitCanvas.getContext('2d');
  scatterCanvas = document.getElementById('scatter-chart');
  scatterCtx = scatterCanvas.getContext('2d');

  // Populate scatter dropdowns
  populateScatterDropdowns();

  // ── Map camera controls ──
  // Click to select tile (only if not dragging)
  let clickStartX = 0, clickStartY = 0;
  mapCanvas.addEventListener('pointerdown', (e) => {
    clickStartX = e.clientX;
    clickStartY = e.clientY;
    isDragging = true;
    dragLastX = e.clientX;
    dragLastY = e.clientY;
    mapCanvas.style.cursor = 'grabbing';
  });
  window.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - dragLastX;
    const dy = e.clientY - dragLastY;
    dragLastX = e.clientX;
    dragLastY = e.clientY;
    if (e.shiftKey) {
      camTilt = Math.max(0.2, Math.min(0.8, camTilt + dy * 0.004));
    } else {
      camPanX += dx;
      camPanY += dy;
    }
    renderMap();
  });
  window.addEventListener('pointerup', (e) => {
    if (isDragging) {
      const dist = Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY);
      if (dist < 6) onMapClick(e); // click, not drag
    }
    isDragging = false;
    mapCanvas.style.cursor = 'grab';
  });
  // Scroll to zoom
  mapCanvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    camZoom = Math.max(0.4, Math.min(3.0, camZoom + (e.deltaY > 0 ? -0.1 : 0.1)));
    renderMap();
  }, { passive: false });
  // Touch: one-finger pan, two-finger zoom
  let lastTouchDist = 0;
  mapCanvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      clickStartX = dragLastX = e.touches[0].clientX;
      clickStartY = dragLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });
  mapCanvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - dragLastX;
      const dy = e.touches[0].clientY - dragLastY;
      dragLastX = e.touches[0].clientX;
      dragLastY = e.touches[0].clientY;
      camPanX += dx;
      camPanY += dy;
      renderMap();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (lastTouchDist > 0) {
        const scale = dist / lastTouchDist;
        camZoom = Math.max(0.4, Math.min(3.0, camZoom * scale));
        renderMap();
      }
      lastTouchDist = dist;
    }
  }, { passive: false });
  mapCanvas.addEventListener('touchend', (e) => {
    if (e.touches.length === 0 && isDragging) {
      const dist = Math.hypot(
        e.changedTouches[0].clientX - clickStartX,
        e.changedTouches[0].clientY - clickStartY
      );
      if (dist < 10) onMapClick(e.changedTouches[0]);
      isDragging = false;
    }
    lastTouchDist = 0;
  });
  // Double-click/tap to reset camera
  mapCanvas.addEventListener('dblclick', () => {
    camTilt = 0.5; camZoom = 1.0; camPanX = 0; camPanY = 0;
    renderMap();
  });
  mapCanvas.style.cursor = 'grab';

  window.addEventListener('resize', () => { resizeCanvases(); renderAll(); });
}

function resizeCanvases() {
  const mapArea = document.getElementById('map-area');
  mapCanvas.width = mapArea.clientWidth;
  mapCanvas.height = mapArea.clientHeight;

  const dpr = window.devicePixelRatio || 1;
  for (const c of [popCanvas, traitCanvas, scatterCanvas]) {
    c.width = c.clientWidth * dpr;
    c.height = c.clientHeight * dpr;
    c.getContext('2d').scale(dpr, dpr);
  }
}

// ── SPECIES SELECTION ──
function selectSpecies(i) {
  selectedSpecies = i;
  document.querySelectorAll('.species-tab').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === i);
    btn.style.borderColor = idx === i ? SPECIES[i].color : '';
  });
  document.getElementById('trait-title').textContent = SPECIES[i].trait + ' Distribution';
  renderAll();
}

// ── PANEL MODE ──
function setPanelMode(mode) {
  panelMode = mode;
  document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
    btn.classList.toggle('active', (mode === 'global' && idx === 0) || (mode === 'tile' && idx === 1));
  });
  if (mode === 'global') {
    selectedTile = null;
    document.getElementById('panel-title').textContent = 'Global Overview';
  } else if (!selectedTile) {
    document.getElementById('panel-title').textContent = 'Click a tile';
  }
  renderAll();
}

// ── MAP CLICK (isometric reverse projection) ──
function onMapClick(e) {
  const rect = mapCanvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  const gs = pyodide.runPython('GRID_SIZE');
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const baseTileW = (w / gs) * 0.9 * camZoom;
  const tileW = baseTileW;
  const tileH = tileW * camTilt;
  const heightScale = 80 * camZoom;
  const totalIsoH = gs * tileH * 0.5;
  const offsetX = w / 2 + camPanX;
  const offsetY = (h - totalIsoH + heightScale) / 2 + camPanY;

  // Get elevation data for accurate hit testing
  const dataJson = pyodide.runPython(`get_map_data(${selectedSpecies})`);
  const data = JSON.parse(dataJson);

  // Brute force: find which tile's diamond contains the click point
  // Check front-to-back so topmost tile wins
  let bestR = -1, bestC = -1, bestSy = -Infinity;
  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const elev = data.elevations[r][c];
      const ix = (c - r) * (tileW * 0.5);
      const iy = (c + r) * (tileH * 0.5);
      const iz = elev * heightScale;
      const cx = offsetX + ix;
      const cy = offsetY + iy - iz;  // account for elevation offset
      // Diamond hit test on top face
      const dx = Math.abs(sx - cx) / (tileW * 0.5);
      const dy = Math.abs(sy - cy) / (tileH * 0.5);
      if (dx + dy <= 1.0) {
        // Frontmost tile (highest iy) wins
        if (iy > bestSy) {
          bestSy = iy;
          bestR = r;
          bestC = c;
        }
      }
    }
  }

  if (bestR >= 0 && bestC >= 0) {
    selectedTile = { r: bestR, c: bestC };
    panelMode = 'tile';
    document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
      btn.classList.toggle('active', idx === 1);
    });
    document.getElementById('panel-title').textContent = `Tile (${bestR}, ${bestC})`;
    renderAll();
  }
}

// ── PLAY / SPEED ──
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) tick();
}

function setSpeed(s) {
  speed = s;
  stepsPerFrame = s >= 20 ? s / 5 : 1;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.speed) === s);
  });
}

// ── SIM TICK ──
function tick() {
  if (!playing) return;

  const steps = Math.max(1, Math.floor(stepsPerFrame));
  for (let i = 0; i < steps; i++) {
    pyodide.runPython('step()');
  }

  // Get state
  const gen = pyodide.runPython('generation');
  document.getElementById('gen-num').textContent = gen.toLocaleString();

  // Collect global populations for history
  const globalPops = [];
  for (let s = 0; s < 5; s++) {
    globalPops.push(pyodide.runPython(`get_global_pop(${s})`));
  }
  // Collect global traits and season for scatter temporal mode
  const globalTraits = [];
  for (let s = 0; s < 5; s++) {
    globalTraits.push(pyodide.runPython(`get_global_trait(${s})`));
  }
  const season = pyodide.runPython('get_season()');
  popHistory.push({ gen, pops: globalPops, traits: globalTraits, season });
  if (popHistory.length > MAX_HISTORY) popHistory.shift();

  // Check events
  const eventsJson = pyodide.runPython('get_and_clear_events()');
  const events = JSON.parse(eventsJson);
  if (events.length > 0) {
    const feed = document.getElementById('event-feed');
    const log = document.getElementById('event-log');
    events.forEach(ev => {
      const isSpeciation = ev.speciation === true;
      const feedDiv = document.createElement('div');
      feedDiv.innerHTML = `<span class="ev-gen">[Gen ${ev.gen}]</span> <span class="ev-text">${ev.text}</span>`;
      if (isSpeciation) feedDiv.style.color = 'var(--gold-light)';
      feed.appendChild(feedDiv);

      const logDiv = document.createElement('div');
      logDiv.className = 'log-entry' + (isSpeciation ? ' speciation-event' : '');
      logDiv.innerHTML = feedDiv.innerHTML;
      log.appendChild(logDiv);
    });
    // Keep feed short
    while (feed.children.length > 20) feed.removeChild(feed.firstChild);
    log.scrollTop = log.scrollHeight;
    feed.scrollTop = feed.scrollHeight;
  }

  renderAll();

  if (speed <= 5) {
    animFrame = requestAnimationFrame(tick);
  } else {
    animFrame = setTimeout(tick, 16);
  }
}

// ── RENDER ALL ──
function renderAll() {
  renderMap();
  renderSpeciesList();
  renderPopChart();
  renderTraitChart();
  renderScatterPlot();
}

// ── RENDER MAP (Isometric 3D) ──
function renderMap() {
  const gs = pyodide.runPython('GRID_SIZE');
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const ctx = mapCtx;

  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  const si = selectedSpecies;
  const color = SPECIES[si].color;

  // Get density data
  const dataJson = pyodide.runPython(`get_map_data(${si})`);
  const data = JSON.parse(dataJson);

  // Biome base colors: [r, g, b]
  const BIOME_COLORS = {
    deep_water:    [15, 30, 60],
    shallow_marsh: [30, 55, 40],
    reed_beds:     [45, 60, 30],
    tidal_flats:   [60, 50, 35],
    rocky_shore:   [75, 58, 45],
  };

  // Isometric projection params
  const baseTileW = (w / gs) * 0.9 * camZoom;
  const tileW = baseTileW;
  const tileH = tileW * camTilt;
  const heightScale = 80 * camZoom;

  const totalIsoH = gs * tileH * 0.5;
  const offsetX = w / 2 + camPanX;
  const offsetY = (h - totalIsoH + heightScale) / 2 + camPanY;

  // Draw back-to-front for proper occlusion
  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const pop = data.pops[r][c];
      const elev = data.elevations[r][c];
      const biome = data.biomes[r][c];
      const maxPop = data.max_pop || 1;

      // Base color from biome
      const bc = BIOME_COLORS[biome] || [30, 20, 10];
      let tr = bc[0] + elev * 25;
      let tg = bc[1] + elev * 18;
      let tb = bc[2] + elev * 12;

      // Species density overlay — blend into tile color
      if (pop > 0) {
        const intensity = Math.min(1, pop / (maxPop * 0.7));
        const tileColor = (data.speciated && data.variants[r][c] === 1)
          ? SPECIES[si].variantColor : color;
        const rgb = hexToRgb(tileColor);
        const a = intensity * 0.7;
        tr = tr * (1 - a) + rgb.r * a;
        tg = tg * (1 - a) + rgb.g * a;
        tb = tb * (1 - a) + rgb.b * a;
      }

      // Shading: basic directional light
      let shade = 0.7;
      if (r > 0 && c > 0) {
        const hLeft = data.elevations[r][c - 1] || elev;
        const hUp = data.elevations[r - 1][c] || elev;
        shade = 0.55 + 0.45 * Math.max(0, Math.min(1, 0.5 + (elev - hLeft) * 2 + (elev - hUp) * 1.5));
      }

      // Isometric transform
      const ix = (c - r) * (tileW * 0.5);
      const iy = (c + r) * (tileH * 0.5);
      const iz = elev * heightScale;
      const sx = offsetX + ix;
      const sy = offsetY + iy - iz;

      // Pillar extends to common base plane — higher tiles get shorter pillars
      const pillarH = Math.max(10, (1.0 - elev) * heightScale + tileH * 1.5);

      // Back-right face: Top → Right, extruded down (usually occluded)
      ctx.fillStyle = `rgb(${tr * shade * 0.2 | 0},${tg * shade * 0.2 | 0},${tb * shade * 0.2 | 0})`;
      ctx.beginPath();
      ctx.moveTo(sx, sy - tileH * 0.5);                        // Top vertex
      ctx.lineTo(sx + tileW * 0.5, sy);                        // Right vertex
      ctx.lineTo(sx + tileW * 0.5, sy + pillarH);              // Right + pillar
      ctx.lineTo(sx, sy - tileH * 0.5 + pillarH);              // Top + pillar
      ctx.fill();

      // Back-left face: Left → Top, extruded down (usually occluded)
      ctx.fillStyle = `rgb(${tr * shade * 0.15 | 0},${tg * shade * 0.15 | 0},${tb * shade * 0.15 | 0})`;
      ctx.beginPath();
      ctx.moveTo(sx - tileW * 0.5, sy);                        // Left vertex
      ctx.lineTo(sx, sy - tileH * 0.5);                        // Top vertex
      ctx.lineTo(sx, sy - tileH * 0.5 + pillarH);              // Top + pillar
      ctx.lineTo(sx - tileW * 0.5, sy + pillarH);              // Left + pillar
      ctx.fill();

      // Right face: Right → Bottom, extruded down
      ctx.fillStyle = `rgb(${tr * shade * 0.4 | 0},${tg * shade * 0.4 | 0},${tb * shade * 0.4 | 0})`;
      ctx.beginPath();
      ctx.moveTo(sx + tileW * 0.5, sy);                        // Right vertex
      ctx.lineTo(sx, sy + tileH * 0.5);                        // Bottom vertex
      ctx.lineTo(sx, sy + tileH * 0.5 + pillarH);              // Bottom + pillar
      ctx.lineTo(sx + tileW * 0.5, sy + pillarH);              // Right + pillar
      ctx.fill();

      // Left face: Bottom → Left, extruded down
      ctx.fillStyle = `rgb(${tr * shade * 0.25 | 0},${tg * shade * 0.25 | 0},${tb * shade * 0.25 | 0})`;
      ctx.beginPath();
      ctx.moveTo(sx, sy + tileH * 0.5);                        // Bottom vertex
      ctx.lineTo(sx - tileW * 0.5, sy);                        // Left vertex
      ctx.lineTo(sx - tileW * 0.5, sy + pillarH);              // Left + pillar
      ctx.lineTo(sx, sy + tileH * 0.5 + pillarH);              // Bottom + pillar
      ctx.fill();

      // Top face
      ctx.fillStyle = `rgb(${tr * shade | 0},${tg * shade | 0},${tb * shade | 0})`;
      ctx.beginPath();
      ctx.moveTo(sx, sy - tileH * 0.5);
      ctx.lineTo(sx + tileW * 0.5, sy);
      ctx.lineTo(sx, sy + tileH * 0.5);
      ctx.lineTo(sx - tileW * 0.5, sy);
      ctx.closePath();
      ctx.fill();

      // Water shimmer for deep/shallow tiles
      if (biome === 'deep_water' || biome === 'shallow_marsh') {
        const shimmer = biome === 'deep_water' ? 0.2 : 0.1;
        ctx.fillStyle = `rgba(20, 50, 80, ${shimmer})`;
        ctx.beginPath();
        ctx.moveTo(sx, sy - tileH * 0.5);
        ctx.lineTo(sx + tileW * 0.5, sy);
        ctx.lineTo(sx, sy + tileH * 0.5);
        ctx.lineTo(sx - tileW * 0.5, sy);
        ctx.closePath();
        ctx.fill();
      }

      // Grid lines on top face
      ctx.strokeStyle = 'rgba(221,193,101,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(sx, sy - tileH * 0.5);
      ctx.lineTo(sx + tileW * 0.5, sy);
      ctx.lineTo(sx, sy + tileH * 0.5);
      ctx.lineTo(sx - tileW * 0.5, sy);
      ctx.closePath();
      ctx.stroke();

      // Selected tile glow
      if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
        ctx.strokeStyle = '#FFE9A3';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx, sy - tileH * 0.5);
        ctx.lineTo(sx + tileW * 0.5, sy);
        ctx.lineTo(sx, sy + tileH * 0.5);
        ctx.lineTo(sx - tileW * 0.5, sy);
        ctx.closePath();
        ctx.stroke();
        // Glow overlay
        ctx.fillStyle = 'rgba(255,233,163,0.15)';
        ctx.fill();
      }
    }
  }

  // Vignette
  const grad = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.35, w / 2, h / 2, Math.min(w, h) * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(26,13,0,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
}

// ── RENDER SPECIES LIST ──
function renderSpeciesList() {
  const listEl = document.getElementById('species-list');
  let html = '';

  // Fetch speciation info once
  const specInfoJson = pyodide.runPython('get_speciation_info()');
  const specInfo = JSON.parse(specInfoJson);

  if (panelMode === 'global') {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_global_pop(${s})`);
      const trait = pyodide.runPython(`get_global_trait(${s})`);
      const info = specInfo[String(s)];

      if (info) {
        // Show parent species row
        html += `<div class="species-row">
          <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
          <div class="sp-name">${SPECIES[s].fullName}</div>
          <div class="sp-pop">${pop}</div>
          <div class="sp-trait">${trait.toFixed(3)}</div>
        </div>`;
        // Variant sub-entries
        html += `<div class="species-row species-variant">
          <div class="sp-dot" style="background:${SPECIES[s].color}; width:6px; height:6px;"></div>
          <div class="sp-name sp-variant-name">${info.parent_name}</div>
          <div class="sp-pop">${info.parent_pop}</div>
          <div class="sp-trait">${info.parent_trait.toFixed(3)}</div>
        </div>`;
        html += `<div class="species-row species-variant">
          <div class="sp-dot" style="background:${SPECIES[s].variantColor}; width:6px; height:6px;"></div>
          <div class="sp-name sp-variant-name">${info.variant_name}</div>
          <div class="sp-pop">${info.variant_pop}</div>
          <div class="sp-trait">${info.variant_trait.toFixed(3)}</div>
        </div>`;
      } else {
        html += `<div class="species-row">
          <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
          <div class="sp-name">${SPECIES[s].fullName}</div>
          <div class="sp-pop">${pop}</div>
          <div class="sp-trait">${trait.toFixed(3)}</div>
        </div>`;
      }
    }
  } else if (selectedTile) {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_tile_pop(${selectedTile.r},${selectedTile.c},${s})`);
      const trait = pyodide.runPython(`get_tile_trait(${selectedTile.r},${selectedTile.c},${s})`);
      const info = specInfo[String(s)];

      // Determine variant color for this tile
      let dotColor = SPECIES[s].color;
      let tileName = SPECIES[s].name;
      if (info && pop > 0) {
        if (trait > info.split_trait) {
          dotColor = SPECIES[s].variantColor;
          tileName = info.variant_name;
        } else {
          tileName = info.parent_name;
        }
      }

      html += `<div class="species-row">
        <div class="sp-dot" style="background:${dotColor}"></div>
        <div class="sp-name">${tileName}</div>
        <div class="sp-pop">${pop}</div>
        <div class="sp-trait">${trait.toFixed(3)}</div>
      </div>`;
    }
  } else {
    html = '<div style="color:var(--dim);font-size:10px;">Click a tile on the map</div>';
  }

  listEl.innerHTML = html;
}

// ── RENDER POP CHART ──
function renderPopChart() {
  const ctx = popCtx;
  const w = popCanvas.clientWidth;
  const h = popCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  if (popHistory.length < 2) return;

  // Find max for scaling
  let maxPop = 1;
  popHistory.forEach(entry => {
    entry.pops.forEach(p => { if (p > maxPop) maxPop = p; });
  });

  const padL = 35;
  const padR = 5;
  const padT = 5;
  const padB = 15;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  // Y axis labels
  ctx.fillStyle = '#5a6a50';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(maxPop.toString(), padL - 4, padT + 9);
  ctx.fillText('0', padL - 4, h - padB);

  // X axis
  ctx.strokeStyle = '#3d2a10';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(padL, h - padB);
  ctx.lineTo(w - padR, h - padB);
  ctx.stroke();

  // Draw lines for each species
  for (let s = 0; s < 5; s++) {
    ctx.strokeStyle = SPECIES[s].color;
    ctx.lineWidth = s === selectedSpecies ? 2 : 1;
    ctx.globalAlpha = s === selectedSpecies ? 1 : 0.4;
    ctx.beginPath();

    for (let i = 0; i < popHistory.length; i++) {
      const x = padL + (i / (popHistory.length - 1)) * plotW;
      const y = padT + plotH - (popHistory[i].pops[s] / maxPop) * plotH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ── RENDER TRAIT CHART ──
function renderTraitChart() {
  const ctx = traitCtx;
  const w = traitCanvas.clientWidth;
  const h = traitCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  // Get histogram data from Python
  const histJson = pyodide.runPython(`get_trait_histogram(${selectedSpecies})`);
  const hist = JSON.parse(histJson);

  if (!hist || hist.length === 0) return;

  const padL = 25;
  const padR = 5;
  const padT = 5;
  const padB = 18;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const maxCount = Math.max(...hist.map(b => b.count), 1);
  const barW = plotW / hist.length;

  const rgb = hexToRgb(SPECIES[selectedSpecies].color);

  for (let i = 0; i < hist.length; i++) {
    const barH = (hist[i].count / maxCount) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - barH;

    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
    ctx.fillRect(x + 1, y, barW - 2, barH);
  }

  // X axis labels
  ctx.fillStyle = '#8a7560';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('0.0', padL, h - 2);
  ctx.fillText('0.5', padL + plotW / 2, h - 2);
  ctx.fillText('1.0', padL + plotW, h - 2);
}

// ── UTIL ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// ── SCATTER PLOT ──
function populateScatterDropdowns() {
  const xSel = document.getElementById('scatter-x');
  const ySel = document.getElementById('scatter-y');

  function buildOptions(mode) {
    const opts = [];
    if (mode === 'spatial') {
      for (let s = 0; s < 5; s++) {
        opts.push({ value: `pop_${s}`, label: `${SPECIES[s].name} Pop` });
        opts.push({ value: `trait_${s}`, label: `${SPECIES[s].name} ${SPECIES[s].trait}` });
      }
      opts.push({ value: 'elevation', label: 'Elevation' });
      opts.push({ value: 'food', label: 'Food Level' });
      opts.push({ value: 'water', label: 'Water Level' });
      opts.push({ value: 'temp', label: 'Temperature' });
    } else {
      for (let s = 0; s < 5; s++) {
        opts.push({ value: `pop_${s}`, label: `${SPECIES[s].name} Pop` });
        opts.push({ value: `trait_${s}`, label: `${SPECIES[s].name} ${SPECIES[s].trait}` });
      }
      opts.push({ value: 'season', label: 'Season Factor' });
    }
    return opts;
  }

  function fill(sel, opts, defaultIdx) {
    sel.innerHTML = '';
    opts.forEach((o, i) => {
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.label;
      if (i === defaultIdx) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  const opts = buildOptions(scatterMode);
  // Default: X = Velothrix Pop, Y = Leviathan Pop
  fill(xSel, opts, 0);
  fill(ySel, opts, 2);

  xSel.onchange = () => renderScatterPlot();
  ySel.onchange = () => renderScatterPlot();
}

function setScatterMode(mode) {
  scatterMode = mode;
  document.querySelectorAll('.scatter-mode-toggle button').forEach((btn, idx) => {
    btn.classList.toggle('active', (mode === 'spatial' && idx === 0) || (mode === 'temporal' && idx === 1));
  });
  populateScatterDropdowns();
  renderScatterPlot();
}

function getScatterValue(entry, varKey) {
  // entry is either a tile object (spatial) or a popHistory entry (temporal)
  if (varKey.startsWith('pop_')) {
    const s = parseInt(varKey.split('_')[1]);
    return entry.pops[s];
  }
  if (varKey.startsWith('trait_')) {
    const s = parseInt(varKey.split('_')[1]);
    return entry.traits[s];
  }
  if (varKey === 'elevation') return entry.elev;
  if (varKey === 'food') return entry.food;
  if (varKey === 'water') return entry.water;
  if (varKey === 'temp') return entry.temp;
  if (varKey === 'season') return entry.season;
  return 0;
}

function getVarLabel(varKey) {
  if (varKey.startsWith('pop_')) {
    const s = parseInt(varKey.split('_')[1]);
    return SPECIES[s].name + ' Pop';
  }
  if (varKey.startsWith('trait_')) {
    const s = parseInt(varKey.split('_')[1]);
    return SPECIES[s].trait;
  }
  const labels = { elevation: 'Elevation', food: 'Food', water: 'Water', temp: 'Temp', season: 'Season' };
  return labels[varKey] || varKey;
}

function renderScatterPlot() {
  const ctx = scatterCtx;
  const w = scatterCanvas.clientWidth;
  const h = scatterCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  const xVar = document.getElementById('scatter-x').value;
  const yVar = document.getElementById('scatter-y').value;

  const padL = 40;
  const padR = 10;
  const padT = 10;
  const padB = 22;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  let points = [];

  if (scatterMode === 'spatial') {
    // Get all tile data from Python
    const tilesJson = pyodide.runPython('get_scatter_spatial()');
    const tiles = JSON.parse(tilesJson);
    let maxElev = 0;
    tiles.forEach(t => { if (t.elev > maxElev) maxElev = t.elev; });

    for (let i = 0; i < tiles.length; i++) {
      const tile = tiles[i];
      const xVal = getScatterValue(tile, xVar);
      const yVal = getScatterValue(tile, yVar);
      // Color by elevation
      const elevNorm = maxElev > 0 ? tile.elev / maxElev : 0;
      const r = Math.round(60 + 160 * elevNorm);
      const g = Math.round(40 + 120 * (1 - elevNorm));
      const b = Math.round(20 + 80 * (1 - elevNorm));
      points.push({ x: xVal, y: yVal, color: `rgb(${r},${g},${b})`, alpha: 0.85 });
    }
  } else {
    // Temporal mode: each dot is one generation from popHistory
    if (popHistory.length < 2) return;
    const total = popHistory.length;
    for (let i = 0; i < total; i++) {
      const entry = popHistory[i];
      const xVal = getScatterValue(entry, xVar);
      const yVal = getScatterValue(entry, yVar);
      // Color by recency (older = dimmer)
      const recency = (i + 1) / total;
      const rgb = hexToRgb(SPECIES[selectedSpecies].color);
      points.push({
        x: xVal, y: yVal,
        color: `rgb(${rgb.r},${rgb.g},${rgb.b})`,
        alpha: 0.15 + 0.85 * recency
      });
    }
  }

  if (points.length === 0) return;

  // Compute ranges
  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  points.forEach(p => {
    if (p.x < xMin) xMin = p.x;
    if (p.x > xMax) xMax = p.x;
    if (p.y < yMin) yMin = p.y;
    if (p.y > yMax) yMax = p.y;
  });
  // Prevent zero-range
  if (xMax === xMin) { xMin -= 0.5; xMax += 0.5; }
  if (yMax === yMin) { yMin -= 0.5; yMax += 0.5; }
  const xRange = xMax - xMin;
  const yRange = yMax - yMin;

  // Draw grid lines
  ctx.strokeStyle = '#3d2a10';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const gx = padL + (i / 4) * plotW;
    const gy = padT + (i / 4) * plotH;
    ctx.beginPath(); ctx.moveTo(gx, padT); ctx.lineTo(gx, padT + plotH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(padL + plotW, gy); ctx.stroke();
  }

  // Draw points
  points.forEach(p => {
    const px = padL + ((p.x - xMin) / xRange) * plotW;
    const py = padT + plotH - ((p.y - yMin) / yRange) * plotH;
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(px, py, 3.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Axis labels
  ctx.fillStyle = '#8a7560';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';

  // X axis
  ctx.fillText(formatAxisVal(xMin), padL, h - 2);
  ctx.fillText(formatAxisVal(xMax), padL + plotW, h - 2);
  ctx.fillText(getVarLabel(xVar), padL + plotW / 2, h - 2);

  // Y axis
  ctx.textAlign = 'right';
  ctx.fillText(formatAxisVal(yMax), padL - 4, padT + 9);
  ctx.fillText(formatAxisVal(yMin), padL - 4, padT + plotH);
  ctx.save();
  ctx.translate(8, padT + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillText(getVarLabel(yVar), 0, 0);
  ctx.restore();
}

function formatAxisVal(v) {
  if (Number.isInteger(v) || Math.abs(v) >= 100) return Math.round(v).toString();
  return v.toFixed(2);
}

def _value_noise(x, y, seed):

    global leviathan_acuity, beetle_pressure, caterpillar_timing

    # Compute population-weighted mean allele frequencies across all tiles

    sum_crest = 0.0

        mean_spine = sum_spine / total_pop
    else:
        mean_crest = 0.5
        mean_spine = 0.5

    # Leviathan acuity tracks crest frequency — arms race
    leviathan_acuity += ACUITY_RESPONSE_RATE * (mean_crest - leviathan_acuity)
    leviathan_acuity = max(0.0, min(1.0, leviathan_acuity))

    beetle_pressure += BEETLE_RESPONSE_RATE * (mean_spine - beetle_pressure)
    beetle_pressure = max(0.0, min(1.0, beetle_pressure))

    caterpillar_timing += random.gauss(0, CATERPILLAR_DRIFT_RATE)

    temp_shift = env_trends.get('temperature', {}).get('value', 0)

                    for s_idx, mult in pop_mult.items():
                        if mult < 1.0:
                            loss_rate = (1.0 - mult) * 0.01
                            grid[r][c]['pops'][s_idx] = max(0, int(grid[r][c]['pops'][s_idx] * (1.0 - loss_rate)))
                        elif mult > 1.0:
                            gain_rate = (mult - 1.0) * 0.01
                            grid[r][c]['pops'][s_idx] = int(grid[r][c]['pops'][s_idx] * (1.0 + gain_rate))
                elif ev.get('target_species') is not None:
                    ts = ev['target_species']
                    grid[r][c]['pops'][ts] = max(0, int(grid[r][c]['pops'][ts] * 0.998))

        ev['remaining'] -= 1
        if ev['remaining'] > 0:
            still_active.append(ev)
    active_events = still_active

    # Spawn new events
    if random.random() < EVENT_BASE_PROB and len(active_events) < 2:
        def_idx = random.randint(0, len(EVENT_DEFS) - 1)
        edef = EVENT_DEFS[def_idx]
        cr = random.randint(0, GRID_SIZE - 1)
        cc = random.randint(0, GRID_SIZE - 1)
        radius = random.randint(1, 2)
        duration = random.randint(edef['duration'][0], edef['duration'][1])
        region_name = _get_region_name(cr, cc)

        new_ev = {
            'def_idx': def_idx,
            'remaining': duration,
            'region': (cr, cc, radius),
            'target_species': None,
        }

        narr = edef['narr'].replace('{region}', region_name)
        if edef['pop_mult'] is None and edef['name'] == 'disease':
            target = random.randint(0, NUM_SPECIES - 1)
            new_ev['target_species'] = target
            narr = narr.replace('{species}', names[target])

        active_events.append(new_ev)
        events_buffer.append({'gen': generation, 'text': narr})

def _velothrix_selection(tile, season):
    """Compute per-locus selection coefficients for Velothrix on this tile.
    Returns list of 5 Δp values and a mean fitness multiplier for growth."""
    alleles = tile['alleles']
    lev_pop = tile['pops'][LEVIATHAN]
    pop = tile['pops'][VELOTHRIX]

    # Environmental modifiers from trends
    body_opt = BODY_OPTIMUM + env_trends.get('terrain_roughness', {}).get('value', 0)
    litter_opt = caterpillar_timing  # Lack optimum tracks caterpillar emergence

    delta_p = [0.0] * NUM_LOCI
    w_locus = [1.0] * NUM_LOCI  # per-locus fitness contribution

    # ── CREST: sexual selection UP, predation DOWN (frequency-dependent) ──
    p = alleles[LOCUS_CREST]
    q = 1.0 - p
    s_net = SEL_CREST_SEXUAL - SEL_CREST_PREDATION * leviathan_acuity * (lev_pop / max(1, BASE_K[LEVIATHAN]))
    h = DOMINANCE[LOCUS_CREST]
    if q > 0.001 and p > 0.001:
        # Δp = pq·s·[ph + q(1-h)] / w̄ (simplified: w̄ ≈ 1 for small s)
        delta_p[LOCUS_CREST] = p * q * s_net * (p * h + q * (1 - h))
    # Fitness: w̄ = p²·1 + 2pq·(1-h·|s|) + q²·(1-|s|)
    w_locus[LOCUS_CREST] = max(0.5, 1.0 - abs(s_net) * q * q)

    # ── SPINE: beetle defense vs metabolic cost ──
    p = alleles[LOCUS_SPINE]
    q = 1.0 - p
    s_net = SEL_SPINE_BENEFIT * beetle_pressure - SEL_SPINE_COST
    h = DOMINANCE[LOCUS_SPINE]
    if q > 0.001 and p > 0.001:
        delta_p[LOCUS_SPINE] = p * q * s_net * (p * h + q * (1 - h))
    w_locus[LOCUS_SPINE] = max(0.5, 1.0 - abs(s_net) * q * q)

    # ── BODY: Gaussian stabilizing selection ──
    p = alleles[LOCUS_BODY]
    q = 1.0 - p
    # Phenotypic mean from allele frequency (additive)
    z_mean = p  # normalized body size
    # Fitness = exp(-(z - θ)² / 2σ²)
    fitness_body = math.exp(-((z_mean - body_opt) ** 2) / (2 * BODY_SIGMA * BODY_SIGMA))
    # Selection gradient: dW/dp ∝ -(z_mean - θ) / σ²
    s_stab = -SEL_BODY_STRENGTH * (z_mean - body_opt) / (BODY_SIGMA * BODY_SIGMA)
    if q > 0.001 and p > 0.001:
        delta_p[LOCUS_BODY] = p * q * s_stab
    w_locus[LOCUS_BODY] = fitness_body

    # ── LITTER: Lack clutch size optimum ──
    p = alleles[LOCUS_LITTER]
    q = 1.0 - p
    z_mean = p
    fitness_litter = math.exp(-((z_mean - litter_opt) ** 2) / (2 * LITTER_SIGMA * LITTER_SIGMA))
    s_lack = -SEL_LITTER_STRENGTH * (z_mean - litter_opt) / (LITTER_SIGMA * LITTER_SIGMA)
    if q > 0.001 and p > 0.001:
        delta_p[LOCUS_LITTER] = p * q * s_lack
    w_locus[LOCUS_LITTER] = fitness_litter

    # ── DISP: density-dependent dispersal selection ──
    p = alleles[LOCUS_DISP]
    q = 1.0 - p
    suit = habitat_suitability(tile['elevation'], VELOTHRIX)
    k = BASE_K[VELOTHRIX] * suit * tile['food'] * (0.7 + 0.3 * season)
    density = pop / max(1, k)
    # High density favors dispersal; low density penalizes it (Allee effect)
    s_disp = SEL_DISP_DENSITY * (density - 0.5)
    h = DOMINANCE[LOCUS_DISP]
    if q > 0.001 and p > 0.001:
        delta_p[LOCUS_DISP] = p * q * s_disp * (p * h + q * (1 - h))
    w_locus[LOCUS_DISP] = max(0.5, 1.0)  # dispersal doesn't directly affect fitness

    # Mean fitness across loci (multiplicative)
    w_mean = 1.0
    for w in w_locus:
        w_mean *= w

    return delta_p, w_mean

def _update_tile(r, c, season):
    """Update populations and traits for one tile."""
    tile = grid[r][c]
    elev = tile['elevation']

    for s in range(NUM_SPECIES):
        pop = tile['pops'][s]
        if pop <= 0:
            # Check neighbors for recolonization source
            neighbor_pop = 0
            for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                nr, nc = r+dr, c+dc
                if 0 <= nr < GRID_SIZE and 0 <= nc < GRID_SIZE:
                    neighbor_pop += grid[nr][nc]['pops'][s]
            # Higher recolonization chance if neighbors have the species
            recol_rate = 0.005 * habitat_suitability(elev, s)
            if neighbor_pop > 5:
                recol_rate += 0.02 * min(1.0, neighbor_pop / 20.0)
            if random.random() < recol_rate:
                tile['pops'][s] = max(1, int(neighbor_pop * 0.05)) if neighbor_pop > 0 else 1
                tile['traits'][s] = 0.5 + random.uniform(-0.1, 0.1)
                if s == VELOTHRIX:
                    # Inherit alleles from nearest populated neighbor
                    for locus in range(NUM_LOCI):
                        tile['alleles'][locus] = 0.5 + random.uniform(-0.1, 0.1)
                    for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                        nr, nc = r+dr, c+dc
                        if 0 <= nr < GRID_SIZE and 0 <= nc < GRID_SIZE and grid[nr][nc]['pops'][VELOTHRIX] > 0:
                            for locus in range(NUM_LOCI):
                                tile['alleles'][locus] = grid[nr][nc]['alleles'][locus] + random.uniform(-0.05, 0.05)
                                tile['alleles'][locus] = max(0.01, min(0.99, tile['alleles'][locus]))
                            break
                    tile['traits'][VELOTHRIX] = tile['alleles'][LOCUS_CREST]
            continue

        suit = habitat_suitability(elev, s)
        k = BASE_K[s] * suit * tile['food'] * (0.7 + 0.3 * season)

        if s == VELOTHRIX:
            # ── VELOTHRIX: Full allele-frequency genetics ──
            alleles = tile['alleles']
            lev_pop = tile['pops'][LEVIATHAN]
            craw_pop = tile['pops'][CRAWLER]

            # Predation loss (uses CREST freq: brighter = more visible)
            predation_loss = lev_pop * PREDATION_LEVIATHAN_VELOTHRIX * (0.5 + alleles[LOCUS_CREST] * 0.5)
            # Competition
            comp_loss = craw_pop * COMPETITION_VELOTHRIX_CRAWLER
            k = max(1, k - comp_loss * 10)

            # Compute selection pressures (allele changes only, not growth)
            delta_p, w_mean = _velothrix_selection(tile, season)
            sex_sel_bonus = alleles[LOCUS_CREST] * 0.01
            litter_bonus = (alleles[LOCUS_LITTER] - 0.5) * 0.005
            # Growth rate same as original — fitness affects alleles, not demography
            growth = GROWTH_RATES[s] + sex_sel_bonus + litter_bonus

            # Population dynamics
            pop = max(0, pop - int(predation_loss * pop))
            if k <= 0:
                k = 1
            dpop = growth * pop * (1.0 - pop / k)
            new_pop = max(0, int(pop + dpop + random.uniform(-0.5, 0.5)))

            if 0 < new_pop <= 1 and random.random() < 0.02:
                new_pop = 0
            tile['pops'][s] = min(new_pop, int(k * 1.5))

            # ── ALLELE FREQUENCY EVOLUTION ──
            if tile['pops'][s] > 0:
                Ne = max(1, int(tile['pops'][s] * NE_RATIO))
                mean_H = 0.0

                for locus in range(NUM_LOCI):
                    p = alleles[locus]

                    # 1. Selection (Δp computed above)
                    p += delta_p[locus]

                    # 2. Genetic drift: variance = p(1-p) / (2Ne)
                    if Ne > 1 and p > 0.001 and p < 0.999:
                        drift_var = p * (1 - p) / (2 * Ne)
                        p += random.gauss(0, math.sqrt(max(0, drift_var)))

                    # 3. Mutation: forward (A→a) and back (a→A)
                    p = p - MU_FORWARD * p + MU_BACK * (1 - p)

                    # Clamp
                    p = max(0.001, min(0.999, p))
                    alleles[locus] = p

                    # Heterozygosity for this locus
                    mean_H += 2 * p * (1 - p)

                mean_H /= NUM_LOCI

                # Sync backward-compatible fields
                tile['traits'][VELOTHRIX] = alleles[LOCUS_CREST]
                tile['trait_var'][VELOTHRIX] = mean_H

        else:
            # ── OTHER SPECIES: Simplified trait dynamics (unchanged) ──
            trait = tile['traits'][s]

            if s == LEVIATHAN:
                vel_pop = tile['pops'][VELOTHRIX]
                worm_pop = tile['pops'][WORM]
                prey_available = vel_pop + worm_pop * 0.5
                hunt_bonus = trait * 0.005 * prey_available / max(1, BASE_K[VELOTHRIX])
                energy_cost = trait * trait * 0.01
                growth = GROWTH_RATES[s] + hunt_bonus - energy_cost
                k = max(1, k * (0.5 + prey_available / max(1, BASE_K[VELOTHRIX] + BASE_K[WORM])))
                sel_pressure = 0
                if prey_available > BASE_K[VELOTHRIX] * 0.3:
                    sel_pressure = SELECTION_STRENGTH * 0.2
                else:
                    sel_pressure = -SELECTION_STRENGTH * 0.2
                predation_loss = 0
            elif s == CRAWLER:
                safety = trait * 0.8
                food_access = 1.0 - trait * 0.4
                lev_pop = tile['pops'][LEVIATHAN]
                predation_loss = lev_pop * 0.001 * (1 - safety)
                growth = GROWTH_RATES[s] * food_access
                vel_pop = tile['pops'][VELOTHRIX]
                comp_loss = vel_pop * COMPETITION_VELOTHRIX_CRAWLER
                k = max(1, k * food_access - comp_loss * 5)
                sel_pressure = 0
                if lev_pop > BASE_K[LEVIATHAN] * 0.3:
                    sel_pressure = SELECTION_STRENGTH * 0.2
                else:
                    sel_pressure = -SELECTION_STRENGTH * 0.1
            elif s == CRAB:
                mobility = 1.0 - trait * 0.3
                growth = GROWTH_RATES[s] * mobility
                total_pop = sum(tile['pops'])
                space_pressure = total_pop * COMPETITION_CRAB_SPACE
                k = max(1, k - space_pressure * 5)
                predation_loss = 0
                sel_pressure = SELECTION_STRENGTH * (0.5 - trait) * 0.1
                if total_pop > sum(BASE_K) * 0.5:
                    sel_pressure += SELECTION_STRENGTH * 0.15
            elif s == WORM:
                vel_pop = tile['pops'][VELOTHRIX]
                lev_pop = tile['pops'][LEVIATHAN]
                predation_loss = (vel_pop * PREDATION_VELOTHRIX_WORM + lev_pop * PREDATION_LEVIATHAN_WORM) * (0.3 + trait * 0.7)
                sex_sel_bonus = trait * 0.01
                growth = GROWTH_RATES[s] + sex_sel_bonus
                sel_pressure = SELECTION_STRENGTH * 0.2
                predator_count = vel_pop + lev_pop
                if predator_count > 10:
                    sel_pressure -= SELECTION_STRENGTH * 0.3 * (predator_count / max(1, BASE_K[VELOTHRIX] + BASE_K[LEVIATHAN]))

            # Population dynamics (logistic)
            if s != LEVIATHAN:
                pop = max(0, pop - int(predation_loss * pop))
            if k <= 0:
                k = 1
            dpop = growth * pop * (1.0 - pop / k)
            new_pop = max(0, int(pop + dpop + random.uniform(-0.5, 0.5)))
            if 0 < new_pop <= 1 and random.random() < 0.02:
                new_pop = 0
            tile['pops'][s] = min(new_pop, int(k * 1.5))

            # Trait evolution (simplified)
            if tile['pops'][s] > 0:
                new_trait = trait + sel_pressure
                drift = random.gauss(0, DRIFT_STRENGTH / math.sqrt(max(1, tile['pops'][s])))
                new_trait += drift
                if random.random() < MUTATION_RATE * tile['pops'][s]:
                    new_trait += random.gauss(0, MUTATION_STEP)
                tile['traits'][s] = max(0.0, min(1.0, new_trait))
                tile['trait_var'][s] = max(0.001, tile['trait_var'][s] * 0.99 + MUTATION_RATE * 0.01)

def _migrate():
    """Species migrate between adjacent tiles. Velothrix uses island-model gene flow."""
    # Build migration deltas first, apply after
    deltas = [[{s: 0 for s in range(NUM_SPECIES)} for _ in range(GRID_SIZE)] for _ in range(GRID_SIZE)]
    # Allele flow tracking for Velothrix: (target_r, target_c) -> [(source_alleles, weight)]
    allele_flow = {}

    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            tile = grid[r][c]
            neighbors = []
            for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                nr, nc = r+dr, c+dc
                if 0 <= nr < GRID_SIZE and 0 <= nc < GRID_SIZE:
                    neighbors.append((nr, nc))

            if not neighbors:
                continue

            for s in range(NUM_SPECIES):
                pop = tile['pops'][s]
                if pop < 3:
                    continue

                k = BASE_K[s] * habitat_suitability(tile['elevation'], s)
                if k <= 0:
                    continue

                # For Velothrix, dispersal allele modulates migration rate
                if s == VELOTHRIX:
                    disp_freq = tile['alleles'][LOCUS_DISP]
                    mig_rate = GENE_FLOW_M * (0.5 + disp_freq)  # higher disp = more migration
                else:
                    mig_rate = MIGRATION_RATE

                pressure = pop / k
                if pressure < 0.7:
                    continue

                migrants = max(0, int(pop * mig_rate * (pressure - 0.5)))
                if migrants <= 0:
                    continue

                suits = []
                for nr, nc in neighbors:
                    ns = habitat_suitability(grid[nr][nc]['elevation'], s)
                    npop = grid[nr][nc]['pops'][s]
                    nk = BASE_K[s] * ns
                    if nk > 0 and npop < nk:
                        suits.append((nr, nc, ns * (1 - npop/nk)))
                    else:
                        suits.append((nr, nc, 0))

                total_suit = sum(x[2] for x in suits)
                if total_suit <= 0:
                    continue

                actual_migrants = min(migrants, pop // 4)
                deltas[r][c][s] -= actual_migrants

                for nr, nc, su in suits:
                    share = int(actual_migrants * su / total_suit)
                    if share <= 0:
                        continue
                    deltas[nr][nc][s] += share

                    # Track allele flow for Velothrix
                    if s == VELOTHRIX:
                        key = (nr, nc)
                        if key not in allele_flow:
                            allele_flow[key] = []
                        allele_flow[key].append((tile['alleles'][:], share))

    # Apply population deltas
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            for s in range(NUM_SPECIES):
                grid[r][c]['pops'][s] = max(0, grid[r][c]['pops'][s] + deltas[r][c][s])

    # Apply Velothrix allele flow (island model: mix migrant alleles into local pool)
    for (tr, tc), sources in allele_flow.items():
        tile = grid[tr][tc]
        local_pop = tile['pops'][VELOTHRIX]
        if local_pop <= 0:
            continue

        total_migrants = sum(w for _, w in sources)
        if total_migrants <= 0:
            continue

        # Fraction of population that is migrants
        m = total_migrants / local_pop
        m = min(m, 0.5)  # cap at 50% replacement

        # Weighted average migrant allele frequencies
        migrant_alleles = [0.0] * NUM_LOCI
        for src_alleles, weight in sources:
            for locus in range(NUM_LOCI):
                migrant_alleles[locus] += src_alleles[locus] * weight
        for locus in range(NUM_LOCI):
            migrant_alleles[locus] /= total_migrants

        # Island model: p_new = (1-m)*p_local + m*p_migrant
        for locus in range(NUM_LOCI):
            tile['alleles'][locus] = (1 - m) * tile['alleles'][locus] + m * migrant_alleles[locus]

        # Sync traits
        tile['traits'][VELOTHRIX] = tile['alleles'][LOCUS_CREST]

def _compute_velothrix_fst():
    """Compute FST across all Velothrix subpopulations (tiles with pop > 5).
    F_ST = (H_T - H_S) / H_T
    H_T = expected heterozygosity of total population
    H_S = mean expected heterozygosity of subpopulations
    Returns mean FST across all loci, or 0 if insufficient data."""

    # Collect allele frequencies and populations per tile
    subpops = []  # [(pop, alleles)]
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][VELOTHRIX]
            if p > 5:
                subpops.append((p, grid[r][c]['alleles'][:]))

    if len(subpops) < 2:
        return 0.0

    total_pop = sum(sp[0] for sp in subpops)
    if total_pop <= 0:
        return 0.0

    fst_per_locus = []
    for locus in range(NUM_LOCI):
        # H_S: mean subpopulation heterozygosity (weighted by pop)
        H_S = 0.0
        # Compute total (weighted) allele frequency
        p_total = 0.0
        for pop, alleles in subpops:
            p_i = alleles[locus]
            H_S += pop * 2 * p_i * (1 - p_i)
            p_total += pop * p_i
        H_S /= total_pop
        p_total /= total_pop

        # H_T: expected heterozygosity of total population
        H_T = 2 * p_total * (1 - p_total)

        if H_T > 0.001:
            fst_per_locus.append((H_T - H_S) / H_T)
        else:
            fst_per_locus.append(0.0)

    return sum(fst_per_locus) / len(fst_per_locus)

# Legacy trait divergence counter for non-Velothrix species
trait_divergence_counter = {}

def _check_speciation():
    """Check speciation using FST for Velothrix, trait divergence for others."""
    global speciation_events, fst_divergence_counter, fst_warning_fired
    names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
    trait_names = ['crest brightness', 'hunting range', 'burrowing depth', 'shell thickness', 'glow intensity']
    variant_suffixes = [
        ('aurantis', 'amberi'),
        ('major', 'minor'),
        ('viridis', 'pallida'),
        ('robusta', 'gracilis'),
        ('lucens', 'obscura'),
    ]

    # ── VELOTHRIX: FST-based speciation ──
    if VELOTHRIX not in speciation_events:
        fst = _compute_velothrix_fst()
        fst_history.append((generation, fst))

        # Early warning
        if fst > FST_WARNING_THRESHOLD and not fst_warning_fired:
            fst_warning_fired = True
            events_buffer.append({
                'gen': generation,
                'text': f'Field observation: Velothrix subgroups showing genetic divergence (FST={fst:.3f}). Outcome uncertain.',
            })

        if fst > FST_SPECIATION_THRESHOLD:
            fst_divergence_counter += 50  # checked every 50 gens
            if fst_divergence_counter >= SPECIATION_SUSTAINED_GENS:
                # Determine split: cluster tiles by CREST frequency
                traits_by_tile = []
                for r in range(GRID_SIZE):
                    for c in range(GRID_SIZE):
                        if grid[r][c]['pops'][VELOTHRIX] > 5:
                            traits_by_tile.append((r, c, grid[r][c]['alleles'][LOCUS_CREST]))

                if len(traits_by_tile) >= 4:
                    sorted_traits = sorted(traits_by_tile, key=lambda x: x[2])
                    mid = len(sorted_traits) // 2
                    split_trait = (sorted_traits[mid-1][2] + sorted_traits[mid][2]) / 2.0

                    low_tiles = [(r, c) for r, c, t in sorted_traits if t <= split_trait]
                    high_tiles = [(r, c) for r, c, t in sorted_traits if t > split_trait]
                    low_center = f"({sum(r for r,c in low_tiles)//max(1,len(low_tiles))},{sum(c for r,c in low_tiles)//max(1,len(low_tiles))})"
                    high_center = f"({sum(r for r,c in high_tiles)//max(1,len(high_tiles))},{sum(c for r,c in high_tiles)//max(1,len(high_tiles))})"

                    speciation_events[VELOTHRIX] = {
                        'split_trait': split_trait,
                        'gen': generation,
                        'parent_name': 'Velothrix aurantis',
                        'variant_name': 'Velothrix amberi',
                        'fst_at_split': fst,
                    }

                    events_buffer.append({
                        'gen': generation,
                        'text': f'⚡ SPECIATION: Velothrix has split into two species! Velothrix aurantis (centered {low_center}, {len(low_tiles)} tiles) vs Velothrix amberi (centered {high_center}, {len(high_tiles)} tiles). Reproductive isolation confirmed at FST={fst:.3f}.',
                        'speciation': True
                    })
                    fst_divergence_counter = 0
        else:
            fst_divergence_counter = max(0, fst_divergence_counter - 25)  # slow decay
    else:
        # Still track FST post-speciation
        fst = _compute_velothrix_fst()
        fst_history.append((generation, fst))

    # ── OTHER SPECIES: Legacy trait divergence ──
    for s in range(1, NUM_SPECIES):
        if s in speciation_events:
            continue

        traits_by_tile = []
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                if grid[r][c]['pops'][s] > 5:
                    traits_by_tile.append((r, c, grid[r][c]['traits'][s]))

        if len(traits_by_tile) < 4:
            continue

        trait_vals = [t[2] for t in traits_by_tile]
        max_diff = max(trait_vals) - min(trait_vals)

        key = f"species_{s}"
        if max_diff > 0.3:
            trait_divergence_counter[key] = trait_divergence_counter.get(key, 0) + 50
            if trait_divergence_counter[key] >= 100:
                sorted_traits = sorted(traits_by_tile, key=lambda x: x[2])
                mid = len(sorted_traits) // 2
                split_trait = (sorted_traits[mid-1][2] + sorted_traits[mid][2]) / 2.0

                low_tiles = [(r, c) for r, c, t in sorted_traits if t <= split_trait]
                high_tiles = [(r, c) for r, c, t in sorted_traits if t > split_trait]
                low_center = f"({sum(r for r,c in low_tiles)//max(1,len(low_tiles))},{sum(c for r,c in low_tiles)//max(1,len(low_tiles))})"
                high_center = f"({sum(r for r,c in high_tiles)//max(1,len(high_tiles))},{sum(c for r,c in high_tiles)//max(1,len(high_tiles))})"

                parent_suffix, variant_suffix = variant_suffixes[s]
                speciation_events[s] = {
                    'split_trait': split_trait,
                    'gen': generation,
                    'parent_name': f'{names[s]} {parent_suffix}',
                    'variant_name': f'{names[s]} {variant_suffix}',
                }

                events_buffer.append({
                    'gen': generation,
                    'text': f'⚡ SPECIATION: {names[s]} has split! {names[s]} {parent_suffix} (centered {low_center}) vs {names[s]} {variant_suffix} (centered {high_center}).',
                    'speciation': True
                })
                trait_divergence_counter[key] = 0
        else:
            trait_divergence_counter[key] = 0

    # Population surge/crash monitoring
    for s in range(NUM_SPECIES):
        total = sum(grid[r][c]['pops'][s] for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        expected = sum(BASE_K[s] * habitat_suitability(grid[r][c]['elevation'], s) * 0.5
                      for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        if expected > 0:
            ratio = total / expected
            if ratio > 2.0:
                events_buffer.append({
                    'gen': generation,
                    'text': f'{names[s]} population surge — {total} individuals ({ratio:.1f}x expected)'
                })
            elif ratio < 0.2 and total > 0:
                events_buffer.append({
                    'gen': generation,
                    'text': f'{names[s]} population critically low — only {total} individuals remain'
                })

# ── API FUNCTIONS (called from JS) ──

def get_global_pop(species_idx):
    total = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            total += grid[r][c]['pops'][species_idx]
    return total

def get_global_trait(species_idx):
    total_trait = 0.0
    total_pop = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                total_trait += grid[r][c]['traits'][species_idx] * p
                total_pop += p
    if total_pop == 0:
        return 0.5
    return total_trait / total_pop

def get_tile_pop(r, c, species_idx):
    return grid[r][c]['pops'][species_idx]

def get_tile_trait(r, c, species_idx):
    return grid[r][c]['traits'][species_idx]

def get_map_data(species_idx):
    pops = []
    elevations = []
    biomes = []
    variants = []
    max_pop = 1
    has_speciation = species_idx in speciation_events
    split_trait = speciation_events[species_idx]['split_trait'] if has_speciation else 0

    for r in range(GRID_SIZE):
        pop_row = []
        elev_row = []
        biome_row = []
        var_row = []
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            e = grid[r][c]['elevation']
            pop_row.append(p)
            elev_row.append(e)
            biome_row.append(get_biome(e))
            if has_speciation and p > 0:
                var_row.append(1 if grid[r][c]['traits'][species_idx] > split_trait else 0)
            else:
                var_row.append(0)
            if p > max_pop:
                max_pop = p
        pops.append(pop_row)
        elevations.append(elev_row)
        biomes.append(biome_row)
        variants.append(var_row)
    return json.dumps({'pops': pops, 'elevations': elevations, 'biomes': biomes, 'max_pop': max_pop, 'variants': variants, 'speciated': has_speciation})

def get_speciation_info():
    """Return all speciation events for JS."""
    result = {}
    for s, info in speciation_events.items():
        parent_pop = 0
        parent_trait_sum = 0.0
        parent_tiles = []
        variant_pop = 0
        variant_trait_sum = 0.0
        variant_tiles = []
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                p = grid[r][c]['pops'][s]
                if p > 0:
                    t = grid[r][c]['traits'][s]
                    if t > info['split_trait']:
                        variant_pop += p
                        variant_trait_sum += t * p
                        variant_tiles.append(f'{r},{c}')
                    else:
                        parent_pop += p
                        parent_trait_sum += t * p
                        parent_tiles.append(f'{r},{c}')
        result[str(s)] = {
            'parent_name': info['parent_name'],
            'variant_name': info['variant_name'],
            'split_trait': info['split_trait'],
            'gen': info['gen'],
            'parent_pop': parent_pop,
            'parent_trait': parent_trait_sum / max(1, parent_pop),
            'parent_tiles': len(parent_tiles),
            'variant_pop': variant_pop,
            'variant_trait': variant_trait_sum / max(1, variant_pop),
            'variant_tiles': len(variant_tiles),
        }
    return json.dumps(result)

def get_trait_histogram(species_idx):
    """Return histogram of trait values across all tiles (weighted by pop)."""
    num_bins = 20
    bins = [0] * num_bins
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                t = grid[r][c]['traits'][species_idx]
                bin_idx = min(num_bins - 1, int(t * num_bins))
                bins[bin_idx] += p
    result = []
    for i in range(num_bins):
        result.append({'low': i/num_bins, 'high': (i+1)/num_bins, 'count': bins[i]})
    return json.dumps(result)

def get_scatter_spatial():
    """Return per-tile data for spatial scatter plot."""
    tiles = []
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            t = grid[r][c]
            tiles.append({
                'pops': t['pops'][:],
                'traits': [round(v, 4) for v in t['traits']],
                'elev': round(t['elevation'], 4),
                'food': round(t['food'], 4),
                'water': round(t['water'], 4),
                'temp': round(t['temp'], 4),
            })
    return json.dumps(tiles)

def get_and_clear_events():
    global events_buffer
    out = json.dumps(events_buffer)
    events_buffer = []
    return out

# ── NEW GENETICS API ──

def get_velothrix_genetics():
    """Return comprehensive Velothrix genetics data for UI."""
    # Population-weighted allele frequencies across all tiles
    total_pop = 0
    sum_alleles = [0.0] * NUM_LOCI
    sum_H = [0.0] * NUM_LOCI

    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][VELOTHRIX]
            if p > 0:
                for locus in range(NUM_LOCI):
                    freq = grid[r][c]['alleles'][locus]
                    sum_alleles[locus] += freq * p
                    sum_H[locus] += 2 * freq * (1 - freq) * p
                total_pop += p

    if total_pop > 0:
        mean_alleles = [s / total_pop for s in sum_alleles]
        mean_H = [s / total_pop for s in sum_H]
    else:
        mean_alleles = [0.5] * NUM_LOCI
        mean_H = [0.5] * NUM_LOCI

    # Current FST
    fst = _compute_velothrix_fst()

    # Mean fitness
    w_mean_sum = 0.0
    w_count = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            if grid[r][c]['pops'][VELOTHRIX] > 0:
                _, w = _velothrix_selection(grid[r][c], get_season())
                w_mean_sum += w * grid[r][c]['pops'][VELOTHRIX]
                w_count += grid[r][c]['pops'][VELOTHRIX]
    w_bar = w_mean_sum / max(1, w_count)

    return json.dumps({
        'alleles': {LOCUS_NAMES[i]: round(mean_alleles[i], 4) for i in range(NUM_LOCI)},
        'heterozygosity': {LOCUS_NAMES[i]: round(mean_H[i], 4) for i in range(NUM_LOCI)},
        'mean_H': round(sum(mean_H) / NUM_LOCI, 4),
        'fst': round(fst, 4),
        'fst_pct': round(fst * 100, 1),
        'w_bar': round(w_bar, 4),
        'population': total_pop,
        'leviathan_acuity': round(leviathan_acuity, 4),
        'beetle_pressure': round(beetle_pressure, 4),
        'caterpillar_timing': round(caterpillar_timing, 4),
        'locus_names': LOCUS_NAMES,
    })

def get_fst_history():
    """Return FST time series for charting."""
    return json.dumps(fst_history)

def get_env_trends():
    """Return current environmental trend state."""
    return json.dumps({k: round(v['value'], 4) for k, v in env_trends.items()})

def get_tile_alleles(r, c):
    """Return allele frequencies for a specific tile."""
    tile = grid[r][c]
    return json.dumps({
        'alleles': {LOCUS_NAMES[i]: round(tile['alleles'][i], 4) for i in range(NUM_LOCI)},
        'heterozygosity': [round(2 * tile['alleles'][i] * (1 - tile['alleles'][i]), 4) for i in range(NUM_LOCI)],
        'pop': tile['pops'][VELOTHRIX],
    })
`;

<script>
// Mobile tool tray — folder tab for #panel
(function() {
  var panel = document.getElementById('panel');
  if (!panel) return;

  var tab = document.createElement('div');
  tab.className = 'tray-tab';
  tab.setAttribute('role', 'button');
  tab.innerHTML = '<span class="tray-tab-label">Data</span><span class="tray-tab-chevron">&#9650;</span>';
  document.body.appendChild(tab);

  var isOpen = false;

  function toggle(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    isOpen = !isOpen;
    panel.classList.toggle('tray-open', isOpen);
    tab.classList.toggle('tab-active', isOpen);
    requestAnimationFrame(function() {
      tab.style.bottom = isOpen ? panel.offsetHeight + 'px' : '0';
    });
  }

  tab.addEventListener('click', toggle);
  tab.addEventListener('touchend', function(e) {
    e.preventDefault();
    toggle(e);
  });

  document.addEventListener('touchend', function(e) {
    if (isOpen && !panel.contains(e.target) && !tab.contains(e.target)) toggle();
  });
  document.addEventListener('click', function(e) {
    if (isOpen && !panel.contains(e.target) && !tab.contains(e.target)) toggle();
  });

  var startY = 0;
  panel.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
  }, { passive: true });
  panel.addEventListener('touchend', function(e) {
    if (e.changedTouches[0].clientY - startY > 60 && isOpen) toggle();
  }, { passive: true });
})();
</script>
