<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velothrix aurantis — Ecosystem Observation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
<style>
:root {
  --bg: #241200;
  --bg-dark: #1A0D00;
  --gold: #DDC165;
  --gold-light: #FFE9A3;
  --orange: #E5591C;
  --text: #e8d5c0;
  --dim: #8a7560;
  --card: #2a1800;
  --card-hover: #331e00;
  --border: #3d2a10;
  --velothrix: #DDC165;
  --leviathan: #C0392B;
  --crawler: #2ECC71;
  --crab: #E5591C;
  --worm: #9B59B6;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOADING SCREEN ── */
#loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1000;
  gap: 20px;
}
#loader h1 {
  font-family: var(--sans);
  font-size: 28px; font-weight: 800;
  color: var(--gold);
}
#loader p {
  color: var(--dim);
  font-size: 13px;
}
.loader-bar {
  width: 200px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%; width: 0%;
  background: var(--gold);
  transition: width 0.3s;
}

/* ── LAYOUT ── */
#app {
  display: none;
  height: 100vh;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr auto auto;
}

/* ── HEADER ── */
#header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: var(--bg-dark);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
#header h1 {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 800;
  color: var(--gold);
  white-space: nowrap;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-controls button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
}
.header-controls button:hover { background: var(--card-hover); }
.header-controls button.active {
  background: var(--gold);
  color: var(--bg);
  border-color: var(--gold);
}
#gen-counter {
  color: var(--dim);
  font-size: 11px;
  margin-left: auto;
  white-space: nowrap;
}
#gen-counter span { color: var(--gold-light); }

/* ── SPECIES TABS ── */
.species-tabs {
  display: flex;
  gap: 2px;
  margin-left: 16px;
}
.species-tab {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 3px;
  white-space: nowrap;
}
.species-tab:hover { color: var(--text); }
.species-tab.active {
  border-color: var(--gold);
  color: var(--gold);
}

/* ── MAP AREA ── */
#map-area {
  position: relative;
  overflow: hidden;
  background: var(--bg-dark);
}
#map-canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── EVENT FEED OVERLAY ── */
#event-feed {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  max-height: 120px;
  overflow-y: auto;
  background: linear-gradient(transparent, rgba(26,13,0,0.95));
  padding: 40px 12px 8px;
  pointer-events: none;
}
#event-feed div {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
  pointer-events: auto;
}
#event-feed div .ev-gen { color: var(--gold); }
#event-feed div .ev-text { color: var(--text); }

/* ── RIGHT PANEL ── */
#panel {
  background: var(--bg-dark);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.panel-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
}
.panel-section h3 {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panel-toggle {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}
.panel-toggle button {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 6px;
  cursor: pointer;
  border-radius: 2px;
}
.panel-toggle button.active {
  background: var(--card-hover);
  color: var(--gold);
  border-color: var(--gold);
}

/* ── SPECIES ROWS ── */
.species-row {
  display: flex;
  align-items: center;
  padding: 4px 0;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.species-row:last-child { border-bottom: none; }
.sp-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sp-name {
  flex: 1;
  font-size: 10px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sp-pop {
  font-size: 10px;
  color: var(--dim);
  text-align: right;
  min-width: 40px;
}
.sp-trait {
  font-size: 10px;
  color: var(--gold);
  text-align: right;
  min-width: 40px;
}

/* ── COMPARISON MODE ── */
.cmp-header {
  display: flex;
  justify-content: space-between;
  padding: 4px 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  font-size: 10px;
  font-weight: 700;
}
.cmp-label-a { color: #FFE9A3; }
.cmp-label-mid { color: var(--dim); }
.cmp-label-b { color: #E5591C; }

.cmp-section-title {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dim);
  padding: 6px 0 3px;
  border-bottom: 1px solid var(--border);
}

.cmp-row {
  display: flex;
  align-items: center;
  padding: 3px 0;
  gap: 6px;
  border-bottom: 1px solid rgba(61,42,16,0.3);
  font-size: 10px;
}
.cmp-row:last-child { border-bottom: none; }

.cmp-name {
  flex: 0 0 80px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 9px;
}
.cmp-name .sp-dot { flex-shrink: 0; }

.cmp-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.cmp-bar-a, .cmp-bar-b {
  height: 5px;
  border-radius: 1px;
  min-width: 1px;
}

.cmp-vals {
  flex: 0 0 55px;
  text-align: right;
  color: var(--dim);
  font-size: 9px;
}
.cmp-vs {
  color: rgba(138,117,96,0.5);
  font-size: 8px;
  margin: 0 2px;
}

.cmp-val-a {
  flex: 0 0 40px;
  text-align: right;
  color: #FFE9A3;
  font-size: 10px;
}
.cmp-val-b {
  flex: 0 0 40px;
  text-align: right;
  color: #E5591C;
  font-size: 10px;
}

.cmp-delta {
  flex: 0 0 45px;
  text-align: right;
  font-size: 10px;
  font-weight: 700;
}

/* ── CHART CANVASES ── */
.chart-canvas {
  width: 100%;
  height: 120px;
  display: block;
}
.chart-canvas.tall {
  height: 160px;
}

/* ── TIMELINE SCRUBBER ── */
#timeline-bar {
  grid-column: 1 / -1;
  position: relative;
  background: var(--bg-dark);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  height: 38px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
}
#timeline-canvas {
  flex: 1;
  height: 28px;
  cursor: pointer;
  display: block;
}
#btn-live {
  display: none;
  background: var(--orange);
  border: none;
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
#btn-live:hover { opacity: 0.85; }
#timeline-gen-label {
  color: var(--dim);
  font-size: 10px;
  white-space: nowrap;
  min-width: 80px;
  text-align: right;
  flex-shrink: 0;
}
.timeline-tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 10px;
  font-family: var(--mono);
  padding: 4px 8px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 10;
  max-width: 300px;
}

/* ── EVENT LOG ── */
#event-log {
  grid-column: 1 / -1;
  background: var(--bg-dark);
  border-top: 1px solid var(--border);
  max-height: 140px;
  overflow-y: auto;
  padding: 6px 12px;
}
#event-log .log-entry {
  font-size: 10px;
  color: var(--dim);
  padding: 2px 0;
}
#event-log .log-entry .ev-gen { color: var(--gold); }
#event-log .log-entry .ev-text { color: var(--text); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── FOLDER TAB (hidden on desktop) ── */
.tray-tab { display: none; }

/* ── MOBILE LAYOUT ── */
@media (max-width: 768px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto auto;
    height: 100vh;
  }

  #header {
    flex-wrap: wrap;
    padding: 8px 10px;
    gap: 6px;
  }

  #header h1 {
    font-size: 16px;
  }

  .species-tabs {
    order: 3;
    margin-left: 0;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .species-tabs::-webkit-scrollbar { display: none; }

  .header-controls {
    margin-left: auto;
  }

  #gen-counter {
    order: 2;
    margin-left: 0;
  }

  #map-area {
    min-height: 0;
  }

  /* Panel becomes a bottom tray */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 60vh;
    overflow-y: auto;
    background: rgba(26,13,0,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #panel.tray-open {
    transform: translateY(0);
  }

  .chart-canvas {
    height: 100px;
  }
  .chart-canvas.tall {
    height: 130px;
  }

  #event-log {
    grid-column: 1;
    max-height: 100px;
  }

  #event-feed {
    max-height: 80px;
  }

  /* Folder tab */
  .tray-tab {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 101;
    background: rgba(26,13,0,0.95);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    padding: 10px 24px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: bottom 0.3s ease, background 0.2s;
    font-family: var(--mono);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
    min-width: 120px;
  }
  .tray-tab:active {
    background: rgba(229,89,28,0.2);
  }
  .tray-tab-label {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .tray-tab-chevron {
    font-size: 12px;
    color: var(--dim);
    transition: transform 0.3s ease;
    line-height: 1;
  }
  .tray-tab.tab-active .tray-tab-chevron {
    transform: rotate(180deg);
  }
}

@media (max-width: 420px) {
  body { font-size: 11px; }

  #header h1 { font-size: 14px; }

  .header-controls button {
    padding: 4px 7px;
    font-size: 10px;
  }

  .species-tab {
    font-size: 9px;
    padding: 3px 6px;
  }

  .panel-section {
    padding: 8px;
  }

  .panel-section h3 {
    font-size: 11px;
  }
}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>VELOTHRIX</h1>
  <p>Loading Pyodide runtime...</p>
  <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <h1>VELOTHRIX</h1>
    <div class="species-tabs" id="species-tabs"></div>
    <div class="header-controls">
      <button id="btn-play" onclick="togglePlay()">&#9654; Play</button>
      <button onclick="setSpeed(1)" class="speed-btn active" data-speed="1">1x</button>
      <button onclick="setSpeed(5)" class="speed-btn" data-speed="5">5x</button>
      <button onclick="setSpeed(20)" class="speed-btn" data-speed="20">20x</button>
      <button onclick="setSpeed(100)" class="speed-btn" data-speed="100">100x</button>
    </div>
    <div id="gen-counter">Gen <span id="gen-num">0</span></div>
  </div>

  <!-- MAP -->
  <div id="map-area">
    <canvas id="map-canvas"></canvas>
    <div id="event-feed"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="panel">
    <div class="panel-section">
      <h3 id="panel-title">Global Overview</h3>
      <div class="panel-toggle">
        <button class="active" onclick="setPanelMode('global')">Global</button>
        <button onclick="setPanelMode('tile')">Selected Tile</button>
      </div>
      <div id="species-list"></div>
    </div>

    <div class="panel-section">
      <h3>Population Trends</h3>
      <canvas class="chart-canvas tall" id="pop-chart"></canvas>
    </div>

    <div class="panel-section">
      <h3 id="trait-title">Trait Distribution</h3>
      <canvas class="chart-canvas" id="trait-chart"></canvas>
    </div>
  </div>

  <!-- TIMELINE SCRUBBER -->
  <div id="timeline-bar">
    <canvas id="timeline-canvas"></canvas>
    <div id="timeline-tooltip" class="timeline-tooltip"></div>
    <button id="btn-live" onclick="returnToLive()">&#9654; Return to Live</button>
    <span id="timeline-gen-label"></span>
  </div>

  <!-- EVENT LOG -->
  <div id="event-log">
    <div class="log-entry"><span class="ev-gen">[System]</span> <span class="ev-text">Ecosystem initializing...</span></div>
  </div>
</div>

<script>
// ── GLOBALS ──
let pyodide = null;
let playing = false;
let speed = 1;
let selectedSpecies = 0; // index into SPECIES
let panelMode = 'global';
let selectedTile = null; // {r, c} or null — Tile A (gold)
let comparisonTile = null; // {r, c} or null — Tile B (orange)
let popHistory = []; // [{gen, pops: [5 numbers]}]
let mapCanvas, mapCtx;
let popCanvas, popCtx;
let traitCanvas, traitCtx;
let animFrame = null;
let stepsPerFrame = 1;

// Timeline scrubber state
let timelineLive = true; // true = showing live state
let timelineSnapshotIdx = -1; // index into Python snapshots array when scrubbing
let timelineCanvas, timelineCtx;
let timelineDragging = false;
let cachedSnapGens = []; // [{gen, hasEvents}] — refreshed each tick

const SPECIES = [
  { name: 'Velothrix', fullName: 'Velothrix aurantis', color: '#DDC165', trait: 'Crest Brightness' },
  { name: 'Leviathan', fullName: 'Kelp Leviathan', color: '#C0392B', trait: 'Hunting Range' },
  { name: 'Crawler', fullName: 'Reed Crawler', color: '#2ECC71', trait: 'Burrowing Depth' },
  { name: 'Crab', fullName: 'Tidal Crab', color: '#E5591C', trait: 'Shell Thickness' },
  { name: 'Worm', fullName: 'Bioluminescent Worm', color: '#9B59B6', trait: 'Glow Intensity' }
];

const MAX_HISTORY = 200;

// ── INIT ──
async function init() {
  const fill = document.getElementById('loader-fill');
  fill.style.width = '20%';

  pyodide = await loadPyodide();
  fill.style.width = '50%';

  await pyodide.runPythonAsync(SIM_CODE);
  fill.style.width = '80%';

  setupUI();
  fill.style.width = '100%';

  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'grid';
    resizeCanvases();
    renderAll();
  }, 300);
}

function setupUI() {
  // Species tabs
  const tabsEl = document.getElementById('species-tabs');
  SPECIES.forEach((sp, i) => {
    const btn = document.createElement('button');
    btn.className = 'species-tab' + (i === 0 ? ' active' : '');
    btn.textContent = sp.name;
    btn.style.borderColor = i === selectedSpecies ? sp.color : '';
    btn.onclick = () => selectSpecies(i);
    tabsEl.appendChild(btn);
  });

  // Canvases
  mapCanvas = document.getElementById('map-canvas');
  mapCtx = mapCanvas.getContext('2d');
  popCanvas = document.getElementById('pop-chart');
  popCtx = popCanvas.getContext('2d');
  traitCanvas = document.getElementById('trait-chart');
  traitCtx = traitCanvas.getContext('2d');

  // Timeline scrubber
  timelineCanvas = document.getElementById('timeline-canvas');
  timelineCtx = timelineCanvas.getContext('2d');
  setupTimelineInteraction();

  mapCanvas.addEventListener('click', onMapClick);
  window.addEventListener('resize', () => { resizeCanvases(); renderAll(); renderTimeline(); });
}

function resizeCanvases() {
  const mapArea = document.getElementById('map-area');
  mapCanvas.width = mapArea.clientWidth;
  mapCanvas.height = mapArea.clientHeight;

  // Timeline canvas
  timelineCanvas.width = timelineCanvas.clientWidth;
  timelineCanvas.height = timelineCanvas.clientHeight;

  const dpr = window.devicePixelRatio || 1;
  for (const c of [popCanvas, traitCanvas]) {
    c.width = c.clientWidth * dpr;
    c.height = c.clientHeight * dpr;
    c.getContext('2d').scale(dpr, dpr);
  }
}

// ── SPECIES SELECTION ──
function selectSpecies(i) {
  selectedSpecies = i;
  document.querySelectorAll('.species-tab').forEach((btn, idx) => {
    btn.classList.toggle('active', idx === i);
    btn.style.borderColor = idx === i ? SPECIES[i].color : '';
  });
  document.getElementById('trait-title').textContent = SPECIES[i].trait + ' Distribution';
  renderAll();
}

// ── PANEL MODE ──
function setPanelMode(mode) {
  panelMode = mode;
  document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
    btn.classList.toggle('active', (mode === 'global' && idx === 0) || (mode === 'tile' && idx === 1));
  });
  if (mode === 'global') {
    if (selectedTile) pyodide.runPython(`untrack_tile(${selectedTile.r},${selectedTile.c})`);
    if (comparisonTile) pyodide.runPython(`untrack_tile(${comparisonTile.r},${comparisonTile.c})`);
    selectedTile = null;
    comparisonTile = null;
    document.getElementById('panel-title').textContent = 'Global Overview';
  } else if (!selectedTile) {
    document.getElementById('panel-title').textContent = 'Click a tile';
  }
  renderAll();
}

// ── MAP CLICK ──
function onMapClick(e) {
  const rect = mapCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const gridSize = pyodide.runPython('GRID_SIZE');
  const tileW = mapCanvas.width / gridSize;
  const tileH = mapCanvas.height / gridSize;

  const c = Math.floor(x / tileW);
  const r = Math.floor(y / tileH);

  if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
    if (e.shiftKey && selectedTile) {
      // Shift+click sets Tile B for comparison
      if (comparisonTile) {
        pyodide.runPython(`untrack_tile(${comparisonTile.r},${comparisonTile.c})`);
      }
      comparisonTile = { r, c };
      pyodide.runPython(`track_tile(${r},${c})`);
      panelMode = 'compare';
      document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
        btn.classList.toggle('active', idx === 1);
      });
      document.getElementById('panel-title').textContent = `Comparing (${selectedTile.r},${selectedTile.c}) vs (${r},${c})`;
    } else {
      // Normal click: set Tile A, clear Tile B
      if (comparisonTile) {
        pyodide.runPython(`untrack_tile(${comparisonTile.r},${comparisonTile.c})`);
        comparisonTile = null;
      }
      if (selectedTile) {
        pyodide.runPython(`untrack_tile(${selectedTile.r},${selectedTile.c})`);
      }
      selectedTile = { r, c };
      pyodide.runPython(`track_tile(${r},${c})`);
      panelMode = 'tile';
      document.querySelectorAll('.panel-toggle button').forEach((btn, idx) => {
        btn.classList.toggle('active', idx === 1);
      });
      document.getElementById('panel-title').textContent = `Tile (${r}, ${c})`;
    }
    renderAll();
  }
}

// ── PLAY / SPEED ──
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) {
    if (!timelineLive) returnToLive();
    tick();
  }
}

function setSpeed(s) {
  speed = s;
  stepsPerFrame = s >= 20 ? s / 5 : 1;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.speed) === s);
  });
}

// ── SIM TICK ──
function tick() {
  if (!playing || !timelineLive) return;

  const steps = Math.max(1, Math.floor(stepsPerFrame));
  for (let i = 0; i < steps; i++) {
    pyodide.runPython('step()');
  }

  // Get state
  const gen = pyodide.runPython('generation');
  document.getElementById('gen-num').textContent = gen.toLocaleString();

  // Collect global populations for history
  const globalPops = [];
  for (let s = 0; s < 5; s++) {
    globalPops.push(pyodide.runPython(`get_global_pop(${s})`));
  }
  popHistory.push({ gen, pops: globalPops });
  if (popHistory.length > MAX_HISTORY) popHistory.shift();

  // Check events
  const eventsJson = pyodide.runPython('get_and_clear_events()');
  const events = JSON.parse(eventsJson);
  if (events.length > 0) {
    const feed = document.getElementById('event-feed');
    const log = document.getElementById('event-log');
    events.forEach(ev => {
      const feedDiv = document.createElement('div');
      feedDiv.innerHTML = `<span class="ev-gen">[Gen ${ev.gen}]</span> <span class="ev-text">${ev.text}</span>`;
      feed.appendChild(feedDiv);

      const logDiv = document.createElement('div');
      logDiv.className = 'log-entry';
      logDiv.innerHTML = feedDiv.innerHTML;
      log.appendChild(logDiv);
    });
    // Keep feed short
    while (feed.children.length > 20) feed.removeChild(feed.firstChild);
    log.scrollTop = log.scrollHeight;
    feed.scrollTop = feed.scrollHeight;
  }

  renderAll();
  refreshTimelineData();
  renderTimeline();

  if (speed <= 5) {
    animFrame = requestAnimationFrame(tick);
  } else {
    animFrame = setTimeout(tick, 16);
  }
}

// ── RENDER ALL ──
function renderAll() {
  renderMap();
  renderSpeciesList();
  renderPopChart();
  renderTraitChart();
}

// ── RENDER MAP ──
function renderMap() {
  const gs = pyodide.runPython('GRID_SIZE');
  const w = mapCanvas.width;
  const h = mapCanvas.height;
  const tw = w / gs;
  const th = h / gs;

  mapCtx.fillStyle = '#1A0D00';
  mapCtx.fillRect(0, 0, w, h);

  const si = selectedSpecies;
  const color = SPECIES[si].color;

  // Get density data — historical or live
  let dataJson;
  if (!timelineLive && timelineSnapshotIdx >= 0) {
    dataJson = pyodide.runPython(`get_historical_map_data(${timelineSnapshotIdx}, ${si})`);
  } else {
    dataJson = pyodide.runPython(`get_map_data(${si})`);
  }
  const data = JSON.parse(dataJson);

  for (let r = 0; r < gs; r++) {
    for (let c = 0; c < gs; c++) {
      const pop = data.pops[r][c];
      const elev = data.elevations[r][c];
      const maxPop = data.max_pop || 1;

      // Base tile color from elevation
      const baseR = 26 + elev * 20;
      const baseG = 13 + elev * 15;
      const baseB = 0 + elev * 8;

      const x = c * tw;
      const y = r * th;

      // Draw base
      mapCtx.fillStyle = `rgb(${baseR|0},${baseG|0},${baseB|0})`;
      mapCtx.fillRect(x, y, tw - 1, th - 1);

      // Draw species density overlay
      if (pop > 0) {
        const intensity = Math.min(1, pop / (maxPop * 0.7));
        const rgb = hexToRgb(color);
        mapCtx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${intensity * 0.8})`;
        mapCtx.fillRect(x, y, tw - 1, th - 1);
      }

      // Selected tile highlights
      if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
        mapCtx.strokeStyle = '#FFE9A3'; // gold for Tile A
        mapCtx.lineWidth = 2;
        mapCtx.strokeRect(x + 1, y + 1, tw - 3, th - 3);
        mapCtx.fillStyle = 'rgba(221,193,101,0.15)';
        mapCtx.fillRect(x, y, tw - 1, th - 1);
      }
      if (comparisonTile && comparisonTile.r === r && comparisonTile.c === c) {
        mapCtx.strokeStyle = '#E5591C'; // orange for Tile B
        mapCtx.lineWidth = 2;
        mapCtx.strokeRect(x + 1, y + 1, tw - 3, th - 3);
        mapCtx.fillStyle = 'rgba(229,89,28,0.15)';
        mapCtx.fillRect(x, y, tw - 1, th - 1);
      }
    }
  }

  // Draw grid lines (very subtle)
  mapCtx.strokeStyle = 'rgba(61,42,16,0.3)';
  mapCtx.lineWidth = 0.5;
  for (let i = 0; i <= gs; i++) {
    mapCtx.beginPath();
    mapCtx.moveTo(i * tw, 0);
    mapCtx.lineTo(i * tw, h);
    mapCtx.stroke();
    mapCtx.beginPath();
    mapCtx.moveTo(0, i * th);
    mapCtx.lineTo(w, i * th);
    mapCtx.stroke();
  }
}

// ── RENDER SPECIES LIST ──
function renderSpeciesList() {
  const listEl = document.getElementById('species-list');
  let html = '';

  if (panelMode === 'compare' && selectedTile && comparisonTile) {
    // Comparison mode
    const tA = selectedTile, tB = comparisonTile;

    // Environment comparison
    const envA = JSON.parse(pyodide.runPython(`get_tile_env(${tA.r},${tA.c})`));
    const envB = JSON.parse(pyodide.runPython(`get_tile_env(${tB.r},${tB.c})`));

    html += `<div class="cmp-header">
      <span class="cmp-label-a">A (${tA.r},${tA.c})</span>
      <span class="cmp-label-mid">Δ</span>
      <span class="cmp-label-b">B (${tB.r},${tB.c})</span>
    </div>`;

    // Environment rows
    html += '<div class="cmp-section-title">Environment</div>';
    const envKeys = ['elevation', 'food', 'water', 'temp'];
    const envLabels = ['Elevation', 'Food', 'Water', 'Temp'];
    for (let i = 0; i < envKeys.length; i++) {
      const a = envA[envKeys[i]], b = envB[envKeys[i]];
      const delta = a - b;
      html += renderComparisonRow(envLabels[i], a.toFixed(3), b.toFixed(3), delta, 1);
    }

    // Species comparison
    html += '<div class="cmp-section-title">Populations</div>';
    let maxPop = 1;
    const popsA = [], popsB = [];
    for (let s = 0; s < 5; s++) {
      popsA[s] = pyodide.runPython(`get_tile_pop(${tA.r},${tA.c},${s})`);
      popsB[s] = pyodide.runPython(`get_tile_pop(${tB.r},${tB.c},${s})`);
      maxPop = Math.max(maxPop, popsA[s], popsB[s]);
    }
    for (let s = 0; s < 5; s++) {
      const delta = popsA[s] - popsB[s];
      const barA = (popsA[s] / maxPop) * 100;
      const barB = (popsB[s] / maxPop) * 100;
      html += `<div class="cmp-row">
        <div class="cmp-name"><span class="sp-dot" style="background:${SPECIES[s].color}"></span>${SPECIES[s].name}</div>
        <div class="cmp-bars">
          <div class="cmp-bar-a" style="width:${barA}%;background:${SPECIES[s].color};opacity:0.8"></div>
          <div class="cmp-bar-b" style="width:${barB}%;background:${SPECIES[s].color};opacity:0.4"></div>
        </div>
        <div class="cmp-vals">${popsA[s]}<span class="cmp-vs">vs</span>${popsB[s]}</div>
        <div class="cmp-delta" style="color:${deltaColor(delta, maxPop)}">${delta > 0 ? '+' : ''}${delta}</div>
      </div>`;
    }

    // Traits comparison
    html += '<div class="cmp-section-title">Traits</div>';
    for (let s = 0; s < 5; s++) {
      const tA_val = pyodide.runPython(`get_tile_trait(${tA.r},${tA.c},${s})`);
      const tB_val = pyodide.runPython(`get_tile_trait(${tB.r},${tB.c},${s})`);
      const delta = tA_val - tB_val;
      html += renderComparisonRow(
        `<span class="sp-dot" style="background:${SPECIES[s].color}"></span>${SPECIES[s].trait}`,
        tA_val.toFixed(3), tB_val.toFixed(3), delta, 1
      );
    }

  } else if (panelMode === 'global') {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_global_pop(${s})`);
      const trait = pyodide.runPython(`get_global_trait(${s})`);
      html += `<div class="species-row">
        <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
        <div class="sp-name">${SPECIES[s].fullName}</div>
        <div class="sp-pop">${pop}</div>
        <div class="sp-trait">${trait.toFixed(3)}</div>
      </div>`;
    }
  } else if (selectedTile) {
    for (let s = 0; s < 5; s++) {
      const pop = pyodide.runPython(`get_tile_pop(${selectedTile.r},${selectedTile.c},${s})`);
      const trait = pyodide.runPython(`get_tile_trait(${selectedTile.r},${selectedTile.c},${s})`);
      html += `<div class="species-row">
        <div class="sp-dot" style="background:${SPECIES[s].color}"></div>
        <div class="sp-name">${SPECIES[s].name}</div>
        <div class="sp-pop">${pop}</div>
        <div class="sp-trait">${trait.toFixed(3)}</div>
      </div>`;
    }
  } else {
    html = '<div style="color:var(--dim);font-size:10px;">Click a tile on the map</div>';
  }

  listEl.innerHTML = html;
}

function deltaColor(delta, maxRange) {
  if (delta === 0) return 'var(--dim)';
  const intensity = Math.min(1, Math.abs(delta) / (maxRange * 0.5));
  const alpha = 0.4 + intensity * 0.6;
  if (delta > 0) return `rgba(46,204,113,${alpha})`; // green: A > B
  return `rgba(229,89,28,${alpha})`; // orange: B > A
}

function renderComparisonRow(label, valA, valB, delta, maxRange) {
  return `<div class="cmp-row">
    <div class="cmp-name">${label}</div>
    <div class="cmp-val-a">${valA}</div>
    <div class="cmp-delta" style="color:${deltaColor(delta, maxRange)}">${delta > 0 ? '+' : ''}${delta.toFixed(3)}</div>
    <div class="cmp-val-b">${valB}</div>
  </div>`;
}

// ── RENDER POP CHART ──
function renderPopChart() {
  const ctx = popCtx;
  const w = popCanvas.clientWidth;
  const h = popCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  const padL = 35;
  const padR = 5;
  const padT = 5;
  const padB = 15;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  if (panelMode === 'compare' && selectedTile && comparisonTile) {
    // Tile comparison mode — overlay both tiles' histories
    const histA = JSON.parse(pyodide.runPython(`get_tile_history(${selectedTile.r},${selectedTile.c})`));
    const histB = JSON.parse(pyodide.runPython(`get_tile_history(${comparisonTile.r},${comparisonTile.c})`));

    if (histA.length < 2 && histB.length < 2) return;

    // Find max across both
    let maxPop = 1;
    [histA, histB].forEach(hist => {
      hist.forEach(entry => {
        entry.pops.forEach(p => { if (p > maxPop) maxPop = p; });
      });
    });

    // Y axis labels
    ctx.fillStyle = '#5a6a50';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(maxPop.toString(), padL - 4, padT + 9);
    ctx.fillText('0', padL - 4, h - padB);

    // X axis
    ctx.strokeStyle = '#3d2a10';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(padL, h - padB);
    ctx.lineTo(w - padR, h - padB);
    ctx.stroke();

    // Draw Tile A lines (solid)
    function drawTileLines(hist, dashed) {
      if (hist.length < 2) return;
      for (let s = 0; s < 5; s++) {
        ctx.strokeStyle = SPECIES[s].color;
        ctx.lineWidth = s === selectedSpecies ? 2 : 1;
        ctx.globalAlpha = s === selectedSpecies ? 1 : 0.4;
        ctx.setLineDash(dashed ? [4, 3] : []);
        ctx.beginPath();

        for (let i = 0; i < hist.length; i++) {
          const x = padL + (i / (hist.length - 1)) * plotW;
          const y = padT + plotH - (hist[i].pops[s] / maxPop) * plotH;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    drawTileLines(histA, false); // Tile A: solid
    drawTileLines(histB, true);  // Tile B: dashed
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);

    // Legend
    ctx.fillStyle = '#FFE9A3';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('— A (solid)', padL + 4, padT + 10);
    ctx.fillStyle = '#E5591C';
    ctx.fillText('--- B (dashed)', padL + 75, padT + 10);

  } else {
    // Global mode
    if (popHistory.length < 2) return;

    let maxPop = 1;
    popHistory.forEach(entry => {
      entry.pops.forEach(p => { if (p > maxPop) maxPop = p; });
    });

    // Y axis labels
    ctx.fillStyle = '#5a6a50';
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(maxPop.toString(), padL - 4, padT + 9);
    ctx.fillText('0', padL - 4, h - padB);

    // X axis
    ctx.strokeStyle = '#3d2a10';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(padL, h - padB);
    ctx.lineTo(w - padR, h - padB);
    ctx.stroke();

    // Draw lines for each species
    for (let s = 0; s < 5; s++) {
      ctx.strokeStyle = SPECIES[s].color;
      ctx.lineWidth = s === selectedSpecies ? 2 : 1;
      ctx.globalAlpha = s === selectedSpecies ? 1 : 0.4;
      ctx.beginPath();

      for (let i = 0; i < popHistory.length; i++) {
        const x = padL + (i / (popHistory.length - 1)) * plotW;
        const y = padT + plotH - (popHistory[i].pops[s] / maxPop) * plotH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

// ── RENDER TRAIT CHART ──
function renderTraitChart() {
  const ctx = traitCtx;
  const w = traitCanvas.clientWidth;
  const h = traitCanvas.clientHeight;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#1A0D00';
  ctx.fillRect(0, 0, w, h);

  // Get histogram data from Python
  const histJson = pyodide.runPython(`get_trait_histogram(${selectedSpecies})`);
  const hist = JSON.parse(histJson);

  if (!hist || hist.length === 0) return;

  const padL = 25;
  const padR = 5;
  const padT = 5;
  const padB = 18;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const maxCount = Math.max(...hist.map(b => b.count), 1);
  const barW = plotW / hist.length;

  const rgb = hexToRgb(SPECIES[selectedSpecies].color);

  for (let i = 0; i < hist.length; i++) {
    const barH = (hist[i].count / maxCount) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - barH;

    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
    ctx.fillRect(x + 1, y, barW - 2, barH);
  }

  // X axis labels
  ctx.fillStyle = '#8a7560';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('0.0', padL, h - 2);
  ctx.fillText('0.5', padL + plotW / 2, h - 2);
  ctx.fillText('1.0', padL + plotW, h - 2);
}

// ── TIMELINE SCRUBBER ──
function refreshTimelineData() {
  const json = pyodide.runPython('get_snapshot_generations()');
  cachedSnapGens = JSON.parse(json);
}

function renderTimeline() {
  if (!timelineCanvas || cachedSnapGens.length === 0) return;
  const ctx = timelineCtx;
  const w = timelineCanvas.width;
  const h = timelineCanvas.height;
  if (w === 0) return;

  ctx.clearRect(0, 0, w, h);

  const n = cachedSnapGens.length;
  const padL = 2, padR = 2;
  const trackW = w - padL - padR;
  const trackY = h / 2;
  const trackH = 4;

  // Track background
  ctx.fillStyle = '#3d2a10';
  ctx.fillRect(padL, trackY - trackH / 2, trackW, trackH);
  ctx.roundRect && ctx.beginPath();

  // Filled portion (up to current position)
  let fillFrac = 1;
  if (!timelineLive && timelineSnapshotIdx >= 0 && n > 1) {
    fillFrac = timelineSnapshotIdx / (n - 1);
  }
  ctx.fillStyle = 'rgba(221,193,101,0.4)';
  ctx.fillRect(padL, trackY - trackH / 2, trackW * fillFrac, trackH);

  // Event markers
  for (let i = 0; i < n; i++) {
    if (cachedSnapGens[i].hasEvents) {
      const x = padL + (i / (n - 1)) * trackW;
      ctx.fillStyle = '#E5591C';
      ctx.beginPath();
      ctx.arc(x, trackY - 6, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Playhead
  const headX = padL + fillFrac * trackW;
  ctx.fillStyle = timelineLive ? 'var(--gold)' : '#FFE9A3';
  ctx.fillStyle = timelineLive ? '#DDC165' : '#FFE9A3';
  ctx.beginPath();
  ctx.arc(headX, trackY, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#1A0D00';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Generation labels
  ctx.fillStyle = '#8a7560';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Gen ' + cachedSnapGens[0].gen, padL, h - 1);
  ctx.textAlign = 'right';
  ctx.fillText('Gen ' + cachedSnapGens[n - 1].gen, w - padR, h - 1);

  // Update gen label
  const label = document.getElementById('timeline-gen-label');
  if (timelineLive) {
    label.textContent = 'LIVE';
    label.style.color = '#2ECC71';
  } else if (timelineSnapshotIdx >= 0 && timelineSnapshotIdx < n) {
    label.textContent = 'Gen ' + cachedSnapGens[timelineSnapshotIdx].gen;
    label.style.color = 'var(--gold-light)';
  }

  // Show/hide live button
  document.getElementById('btn-live').style.display = timelineLive ? 'none' : 'block';
}

function setupTimelineInteraction() {
  const canvas = timelineCanvas;

  function snapIdxFromX(clientX) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const frac = Math.max(0, Math.min(1, x / rect.width));
    const n = cachedSnapGens.length;
    if (n === 0) return -1;
    return Math.round(frac * (n - 1));
  }

  canvas.addEventListener('mousedown', (e) => {
    if (cachedSnapGens.length < 2) return;
    timelineDragging = true;
    const idx = snapIdxFromX(e.clientX);
    scrubTo(idx);
  });

  window.addEventListener('mousemove', (e) => {
    if (!timelineDragging) {
      // Hover tooltip for event markers
      handleTimelineHover(e);
      return;
    }
    const idx = snapIdxFromX(e.clientX);
    scrubTo(idx);
  });

  window.addEventListener('mouseup', () => {
    timelineDragging = false;
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    if (cachedSnapGens.length < 2) return;
    e.preventDefault();
    timelineDragging = true;
    const idx = snapIdxFromX(e.touches[0].clientX);
    scrubTo(idx);
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (!timelineDragging) return;
    e.preventDefault();
    const idx = snapIdxFromX(e.touches[0].clientX);
    scrubTo(idx);
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    timelineDragging = false;
  });
}

function handleTimelineHover(e) {
  const tooltip = document.getElementById('timeline-tooltip');
  const rect = timelineCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const n = cachedSnapGens.length;
  if (n < 2 || x < 0 || x > rect.width) {
    tooltip.style.display = 'none';
    return;
  }

  const frac = x / rect.width;
  const idx = Math.round(frac * (n - 1));
  if (idx >= 0 && idx < n && cachedSnapGens[idx].hasEvents) {
    const evJson = pyodide.runPython(`get_snapshot_events(${idx})`);
    const evs = JSON.parse(evJson);
    if (evs.length > 0) {
      const text = evs.map(ev => `[Gen ${ev.gen}] ${ev.text}`).join('<br>');
      tooltip.innerHTML = text;
      tooltip.style.display = 'block';
      tooltip.style.left = Math.min(rect.width - 150, Math.max(0, x - 50)) + 'px';
      return;
    }
  }
  tooltip.style.display = 'none';
}

function scrubTo(idx) {
  if (idx < 0 || cachedSnapGens.length === 0) return;
  const n = cachedSnapGens.length;
  idx = Math.max(0, Math.min(n - 1, idx));

  // If scrubbing to the last snapshot (present), return to live
  if (idx === n - 1) {
    returnToLive();
    return;
  }

  timelineLive = false;
  timelineSnapshotIdx = idx;

  // Update gen counter to show historical gen
  document.getElementById('gen-num').textContent = cachedSnapGens[idx].gen.toLocaleString();

  renderMap();
  renderTimeline();
}

function returnToLive() {
  timelineLive = true;
  timelineSnapshotIdx = -1;
  document.getElementById('timeline-tooltip').style.display = 'none';

  // Restore live gen counter
  const gen = pyodide.runPython('generation');
  document.getElementById('gen-num').textContent = gen.toLocaleString();

  renderAll();
  renderTimeline();

  // Resume ticking if was playing
  if (playing && !animFrame) tick();
}

// ── UTIL ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

// ── PYTHON SIM CODE ──
const SIM_CODE = `
import json
import math
import random

# ── CONFIG ──
GRID_SIZE = 8
NUM_SPECIES = 5

# Species indices
VELOTHRIX = 0
LEVIATHAN = 1
CRAWLER = 2
CRAB = 3
WORM = 4

# Carrying capacities per tile
BASE_K = [60, 15, 40, 35, 80]  # Velothrix, Leviathan, Crawler, Crab, Worm

# Growth rates (per generation, logistic)
GROWTH_RATES = [0.03, 0.015, 0.025, 0.02, 0.04]

# Mutation rate and step
MUTATION_RATE = 0.002
MUTATION_STEP = 0.01

# Drift strength (lower = less drift)
DRIFT_STRENGTH = 0.005

# Selection strength (how much trait affects fitness)
SELECTION_STRENGTH = 0.02

# Predation rates (fraction of prey eaten per predator per gen)
PREDATION_LEVIATHAN_VELOTHRIX = 0.003
PREDATION_LEVIATHAN_WORM = 0.002
PREDATION_VELOTHRIX_WORM = 0.001

# Competition coefficients
COMPETITION_VELOTHRIX_CRAWLER = 0.001
COMPETITION_CRAB_SPACE = 0.0005

# Migration rate (fraction that migrates per gen)
MIGRATION_RATE = 0.01

# Event probabilities per gen (very rare)
DROUGHT_PROB = 0.002
FLOOD_PROB = 0.002
DISEASE_PROB = 0.001

# Season cycle length
SEASON_LENGTH = 100

# Speciation tracking
SPECIATION_THRESHOLD = 0.3
SPECIATION_GENS = 100

# ── SNAPSHOT CONFIG ──
SNAPSHOT_INTERVAL = 10
MAX_SNAPSHOTS = 500

# ── STATE ──
generation = 0
events_buffer = []

# Timeline snapshot ring buffer: list of {gen, pops, traits, events}
# pops/traits are flat lists: [row0col0_sp0..sp4, row0col1_sp0..sp4, ...]
snapshots = []
snapshot_events = []  # events accumulated since last snapshot

def _emit_event(ev):
    events_buffer.append(ev)
    snapshot_events.append(ev)

# Per-tile population history ring buffer
TILE_HISTORY_LEN = 200
tile_history = {}  # (r,c) -> list of {gen, pops: [5 ints]}

# Grid state: [row][col] -> tile
# Each tile: {
#   elevation: float 0-1,
#   food: float 0-1,
#   water: float 0-1,
#   temp: float 0-1,
#   pops: [5 ints],         # population per species
#   traits: [5 floats],     # mean trait per species (0-1)
#   trait_var: [5 floats],  # trait variance per species
# }

grid = []

def generate_elevation():
    """Simple value noise for terrain."""
    elev = [[0.0]*GRID_SIZE for _ in range(GRID_SIZE)]
    # Use midpoint displacement-like approach
    random.seed(42)  # Reproducible
    # Place some random control points
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            # Distance from center creates a basin (marsh in center, shores at edges)
            cx, cy = GRID_SIZE/2, GRID_SIZE/2
            dist = math.sqrt((r-cx)**2 + (c-cy)**2) / (GRID_SIZE * 0.7)
            base = 0.3 + dist * 0.5
            noise = random.uniform(-0.15, 0.15)
            elev[r][c] = max(0.0, min(1.0, base + noise))
    random.seed()  # Unseed
    return elev

def init_grid():
    global grid
    elevations = generate_elevation()
    grid = []
    for r in range(GRID_SIZE):
        row = []
        for c in range(GRID_SIZE):
            elev = elevations[r][c]
            # Habitat suitability based on elevation
            # Low elevation = deep water (leviathans), mid = marsh (velothrix), high = shore (crabs)
            tile = {
                'elevation': elev,
                'food': 0.7 + random.uniform(-0.1, 0.1),
                'water': max(0, 1.0 - elev + random.uniform(-0.1, 0.1)),
                'temp': 0.5 + random.uniform(-0.1, 0.1),
                'pops': [0]*NUM_SPECIES,
                'traits': [0.5]*NUM_SPECIES,
                'trait_var': [0.01]*NUM_SPECIES,
            }

            # Set initial populations based on habitat
            # Velothrix: prefer mid elevation (0.3-0.7)
            if 0.2 < elev < 0.8:
                tile['pops'][VELOTHRIX] = int(BASE_K[VELOTHRIX] * random.uniform(0.4, 0.7))
            else:
                tile['pops'][VELOTHRIX] = int(BASE_K[VELOTHRIX] * random.uniform(0.05, 0.2))

            # Leviathan: prefer low elevation (deep water)
            if elev < 0.5:
                tile['pops'][LEVIATHAN] = int(BASE_K[LEVIATHAN] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][LEVIATHAN] = int(BASE_K[LEVIATHAN] * random.uniform(0.0, 0.1))

            # Crawler: prefer mid-low (reeds)
            if 0.25 < elev < 0.65:
                tile['pops'][CRAWLER] = int(BASE_K[CRAWLER] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][CRAWLER] = int(BASE_K[CRAWLER] * random.uniform(0.05, 0.15))

            # Crab: prefer high elevation (shores)
            if elev > 0.5:
                tile['pops'][CRAB] = int(BASE_K[CRAB] * random.uniform(0.3, 0.6))
            else:
                tile['pops'][CRAB] = int(BASE_K[CRAB] * random.uniform(0.0, 0.1))

            # Worm: everywhere, prefer wet
            water_factor = tile['water']
            tile['pops'][WORM] = int(BASE_K[WORM] * water_factor * random.uniform(0.3, 0.7))

            # Initial trait values with slight spatial variation
            for s in range(NUM_SPECIES):
                tile['traits'][s] = 0.5 + random.uniform(-0.05, 0.05)
                tile['trait_var'][s] = 0.01

            row.append(tile)
        grid.append(row)

init_grid()

def habitat_suitability(elev, species_idx):
    """Returns 0-1 suitability for species at given elevation."""
    if species_idx == VELOTHRIX:
        # Peak at 0.5
        return max(0, 1.0 - abs(elev - 0.5) * 2.5)
    elif species_idx == LEVIATHAN:
        # Prefer low (deep water)
        return max(0, 1.0 - elev * 1.8)
    elif species_idx == CRAWLER:
        # Peak at 0.4
        return max(0, 1.0 - abs(elev - 0.4) * 2.5)
    elif species_idx == CRAB:
        # Prefer high (shores)
        return max(0, elev * 1.5 - 0.2)
    elif species_idx == WORM:
        # Everywhere but slightly prefer wet
        return max(0.2, 1.0 - elev * 0.5)
    return 0.5

def get_season():
    """Returns season factor 0-1 (0=harsh winter, 1=peak summer)."""
    return 0.5 + 0.5 * math.sin(2 * math.pi * generation / SEASON_LENGTH)

def step():
    """Advance one generation."""
    global generation
    generation += 1
    season = get_season()

    # 1. Environment update
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            tile = grid[r][c]
            # Food regrows
            tile['food'] = min(1.0, tile['food'] + 0.01 * season)
            # Temperature seasonal
            tile['temp'] = 0.4 + 0.2 * season + random.uniform(-0.02, 0.02)

    # 2. Random events (very rare)
    _check_events(season)

    # 3. Per-tile, per-species dynamics
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            _update_tile(r, c, season)

    # 4. Migration
    _migrate()

    # 5. Speciation check (every 50 gens to save compute)
    if generation % 50 == 0:
        _check_speciation()

    # 6. Record per-tile history for tracked tiles
    for key in list(tile_history.keys()):
        r2, c2 = key
        pops = list(grid[r2][c2]['pops'])
        tile_history[key].append({'gen': generation, 'pops': pops})
        if len(tile_history[key]) > TILE_HISTORY_LEN:
            tile_history[key] = tile_history[key][-TILE_HISTORY_LEN:]

    # 7. Snapshot for timeline scrubber
    if generation % SNAPSHOT_INTERVAL == 0:
        flat_pops = []
        flat_traits = []
        for r3 in range(GRID_SIZE):
            for c3 in range(GRID_SIZE):
                t = grid[r3][c3]
                flat_pops.extend(t['pops'])
                flat_traits.extend(t['traits'])
        snap = {
            'gen': generation,
            'pops': list(flat_pops),
            'traits': list(flat_traits),
            'events': list(snapshot_events)
        }
        snapshots.append(snap)
        if len(snapshots) > MAX_SNAPSHOTS:
            snapshots.pop(0)
        snapshot_events.clear()

def _check_events(season):
    """Check for random environmental events."""
    if random.random() < DROUGHT_PROB:
        # Drought affects a region
        cr = random.randint(0, GRID_SIZE-1)
        cc = random.randint(0, GRID_SIZE-1)
        radius = random.randint(1, 2)
        for r in range(max(0,cr-radius), min(GRID_SIZE,cr+radius+1)):
            for c in range(max(0,cc-radius), min(GRID_SIZE,cc+radius+1)):
                grid[r][c]['food'] *= 0.4
                grid[r][c]['water'] *= 0.5
        region = "eastern" if cc > GRID_SIZE//2 else "western"
        _emit_event({
            'gen': generation,
            'text': f'Drought in {region} marsh — food and water levels dropping'
        })

    if random.random() < FLOOD_PROB:
        cr = random.randint(0, GRID_SIZE-1)
        cc = random.randint(0, GRID_SIZE-1)
        radius = random.randint(1, 2)
        for r in range(max(0,cr-radius), min(GRID_SIZE,cr+radius+1)):
            for c in range(max(0,cc-radius), min(GRID_SIZE,cc+radius+1)):
                grid[r][c]['water'] = min(1.0, grid[r][c]['water'] + 0.3)
                # Flooding hurts land species
                grid[r][c]['pops'][CRAB] = int(grid[r][c]['pops'][CRAB] * 0.7)
                grid[r][c]['pops'][CRAWLER] = int(grid[r][c]['pops'][CRAWLER] * 0.8)
        region = "northern" if cr < GRID_SIZE//2 else "southern"
        _emit_event({
            'gen': generation,
            'text': f'Flooding in {region} tidal flats — water levels surging'
        })

    if random.random() < DISEASE_PROB:
        target = random.randint(0, NUM_SPECIES-1)
        names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
        # Disease affects all tiles but mildly
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                grid[r][c]['pops'][target] = int(grid[r][c]['pops'][target] * 0.85)
        _emit_event({
            'gen': generation,
            'text': f'Disease outbreak affecting {names[target]} population'
        })

def _update_tile(r, c, season):
    """Update populations and traits for one tile."""
    tile = grid[r][c]
    elev = tile['elevation']

    for s in range(NUM_SPECIES):
        pop = tile['pops'][s]
        if pop <= 0:
            # Small chance of recolonization
            if random.random() < 0.001 * habitat_suitability(elev, s):
                tile['pops'][s] = 1
                tile['traits'][s] = 0.5 + random.uniform(-0.1, 0.1)
            continue

        trait = tile['traits'][s]
        trait_v = tile['trait_var'][s]

        # Effective carrying capacity depends on habitat and food
        suit = habitat_suitability(elev, s)
        k = BASE_K[s] * suit * tile['food'] * (0.7 + 0.3 * season)

        # ── SPECIES INTERACTIONS ──
        if s == VELOTHRIX:
            # Predation by Leviathans (brighter = more visible)
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = lev_pop * PREDATION_LEVIATHAN_VELOTHRIX * (0.5 + trait * 0.5)
            # Competition with crawlers
            craw_pop = tile['pops'][CRAWLER]
            comp_loss = craw_pop * COMPETITION_VELOTHRIX_CRAWLER
            k = max(1, k - comp_loss * 10)
            # Sexual selection: brighter = more mates (increases effective growth)
            sex_sel_bonus = trait * 0.01
            growth = GROWTH_RATES[s] + sex_sel_bonus
            # Net selection pressure on trait: sexual sel pushes UP, predation pushes DOWN
            sel_pressure = SELECTION_STRENGTH * (0.5 - trait) * 0.1  # mild stabilizing
            sel_pressure += SELECTION_STRENGTH * 0.3  # sexual selection pushes up
            if lev_pop > 0:
                sel_pressure -= SELECTION_STRENGTH * 0.5 * (lev_pop / max(1, BASE_K[LEVIATHAN]))
        elif s == LEVIATHAN:
            # Energy from prey
            vel_pop = tile['pops'][VELOTHRIX]
            worm_pop = tile['pops'][WORM]
            prey_available = vel_pop + worm_pop * 0.5
            # Hunting range: wider = more prey but more energy cost
            hunt_bonus = trait * 0.005 * prey_available / max(1, BASE_K[VELOTHRIX])
            energy_cost = trait * trait * 0.01
            growth = GROWTH_RATES[s] + hunt_bonus - energy_cost
            k = max(1, k * (0.5 + prey_available / max(1, BASE_K[VELOTHRIX] + BASE_K[WORM])))
            sel_pressure = 0
            if prey_available > BASE_K[VELOTHRIX] * 0.3:
                sel_pressure = SELECTION_STRENGTH * 0.2  # push range up when prey abundant
            else:
                sel_pressure = -SELECTION_STRENGTH * 0.2  # push range down when prey scarce
            predation_loss = 0
        elif s == CRAWLER:
            # Burrowing depth: deeper = safer but less food
            safety = trait * 0.8
            food_access = 1.0 - trait * 0.4
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = lev_pop * 0.001 * (1 - safety)
            growth = GROWTH_RATES[s] * food_access
            vel_pop = tile['pops'][VELOTHRIX]
            comp_loss = vel_pop * COMPETITION_VELOTHRIX_CRAWLER
            k = max(1, k * food_access - comp_loss * 5)
            sel_pressure = 0
            if lev_pop > BASE_K[LEVIATHAN] * 0.3:
                sel_pressure = SELECTION_STRENGTH * 0.2  # burrow deeper when predators present
            else:
                sel_pressure = -SELECTION_STRENGTH * 0.1  # come up for food when safe
        elif s == CRAB:
            # Shell thickness: thicker = armor but slow
            armor = trait * 0.7
            mobility = 1.0 - trait * 0.3
            growth = GROWTH_RATES[s] * mobility
            # Space competition
            total_pop = sum(tile['pops'])
            space_pressure = total_pop * COMPETITION_CRAB_SPACE
            k = max(1, k - space_pressure * 5)
            predation_loss = 0
            sel_pressure = SELECTION_STRENGTH * (0.5 - trait) * 0.1  # stabilizing
            if total_pop > sum(BASE_K) * 0.5:
                sel_pressure += SELECTION_STRENGTH * 0.15  # thicker shells when crowded
        elif s == WORM:
            # Glow: brighter = more mates but more predators
            vel_pop = tile['pops'][VELOTHRIX]
            lev_pop = tile['pops'][LEVIATHAN]
            predation_loss = (vel_pop * PREDATION_VELOTHRIX_WORM + lev_pop * PREDATION_LEVIATHAN_WORM) * (0.3 + trait * 0.7)
            # Sexual selection for brightness
            sex_sel_bonus = trait * 0.01
            growth = GROWTH_RATES[s] + sex_sel_bonus
            sel_pressure = SELECTION_STRENGTH * 0.2  # sexual sel pushes up
            predator_count = vel_pop + lev_pop
            if predator_count > 10:
                sel_pressure -= SELECTION_STRENGTH * 0.3 * (predator_count / max(1, BASE_K[VELOTHRIX] + BASE_K[LEVIATHAN]))

        # ── POPULATION DYNAMICS (logistic) ──
        if s != LEVIATHAN:
            # Apply predation
            pop = max(0, pop - int(predation_loss * pop))

        if k <= 0:
            k = 1
        dpop = growth * pop * (1.0 - pop / k)
        new_pop = max(0, int(pop + dpop + random.uniform(-0.5, 0.5)))

        # Stochastic extinction for very small populations
        if 0 < new_pop <= 2 and random.random() < 0.05:
            new_pop = 0

        tile['pops'][s] = min(new_pop, int(k * 1.5))  # hard cap

        # ── TRAIT EVOLUTION ──
        if tile['pops'][s] > 0:
            # Selection
            new_trait = trait + sel_pressure

            # Drift (inversely proportional to sqrt(pop))
            if tile['pops'][s] > 0:
                drift = random.gauss(0, DRIFT_STRENGTH / math.sqrt(max(1, tile['pops'][s])))
                new_trait += drift

            # Mutation
            if random.random() < MUTATION_RATE * tile['pops'][s]:
                new_trait += random.gauss(0, MUTATION_STEP)

            # Clamp to 0-1
            tile['traits'][s] = max(0.0, min(1.0, new_trait))

            # Update variance (simplified)
            tile['trait_var'][s] = max(0.001, tile['trait_var'][s] * 0.99 + MUTATION_RATE * 0.01)

def _migrate():
    """Species migrate between adjacent tiles."""
    # Build migration deltas first, apply after
    deltas = [[{s: 0 for s in range(NUM_SPECIES)} for _ in range(GRID_SIZE)] for _ in range(GRID_SIZE)]

    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            tile = grid[r][c]
            neighbors = []
            for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
                nr, nc = r+dr, c+dc
                if 0 <= nr < GRID_SIZE and 0 <= nc < GRID_SIZE:
                    neighbors.append((nr, nc))

            if not neighbors:
                continue

            for s in range(NUM_SPECIES):
                pop = tile['pops'][s]
                if pop < 3:
                    continue

                k = BASE_K[s] * habitat_suitability(tile['elevation'], s)
                if k <= 0:
                    continue

                # Migrate when over capacity
                pressure = pop / k
                if pressure < 0.7:
                    continue

                migrants = max(0, int(pop * MIGRATION_RATE * (pressure - 0.5)))
                if migrants <= 0:
                    continue

                # Distribute among neighbors based on suitability
                suits = []
                for nr, nc in neighbors:
                    ns = habitat_suitability(grid[nr][nc]['elevation'], s)
                    npop = grid[nr][nc]['pops'][s]
                    nk = BASE_K[s] * ns
                    if nk > 0 and npop < nk:
                        suits.append((nr, nc, ns * (1 - npop/nk)))
                    else:
                        suits.append((nr, nc, 0))

                total_suit = sum(x[2] for x in suits)
                if total_suit <= 0:
                    continue

                actual_migrants = min(migrants, pop // 4)  # Never migrate more than 25%
                deltas[r][c][s] -= actual_migrants

                for nr, nc, su in suits:
                    share = int(actual_migrants * su / total_suit)
                    deltas[nr][nc][s] += share

    # Apply deltas
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            for s in range(NUM_SPECIES):
                grid[r][c]['pops'][s] = max(0, grid[r][c]['pops'][s] + deltas[r][c][s])

# Track trait divergence for speciation
trait_divergence_counter = {}

def _check_speciation():
    """Check if any species has diverged enough to speciate."""
    for s in range(NUM_SPECIES):
        # Collect traits across all tiles with population
        traits_by_tile = []
        for r in range(GRID_SIZE):
            for c in range(GRID_SIZE):
                if grid[r][c]['pops'][s] > 5:
                    traits_by_tile.append((r, c, grid[r][c]['traits'][s]))

        if len(traits_by_tile) < 4:
            continue

        # Find max trait difference
        trait_vals = [t[2] for t in traits_by_tile]
        max_diff = max(trait_vals) - min(trait_vals)

        key = f"species_{s}"
        if max_diff > SPECIATION_THRESHOLD:
            trait_divergence_counter[key] = trait_divergence_counter.get(key, 0) + 50  # we check every 50 gens
            if trait_divergence_counter[key] >= SPECIATION_GENS:
                names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
                trait_names = ['crest brightness', 'hunting range', 'burrowing depth', 'shell thickness', 'glow intensity']
                # Find where the split is
                sorted_traits = sorted(traits_by_tile, key=lambda x: x[2])
                low_region = sorted_traits[0]
                high_region = sorted_traits[-1]
                _emit_event({
                    'gen': generation,
                    'text': f'{names[s]} population split detected — variant near ({low_region[0]},{low_region[1]}) has {trait_names[s]} {low_region[2]:.2f} vs ({high_region[0]},{high_region[1]}) at {high_region[2]:.2f}'
                })
                trait_divergence_counter[key] = 0  # Reset to avoid spam
        else:
            trait_divergence_counter[key] = 0

    # Also check for population surges/crashes
    for s in range(NUM_SPECIES):
        total = sum(grid[r][c]['pops'][s] for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        expected = sum(BASE_K[s] * habitat_suitability(grid[r][c]['elevation'], s) * 0.5
                      for r in range(GRID_SIZE) for c in range(GRID_SIZE))
        names = ['Velothrix', 'Kelp Leviathan', 'Reed Crawler', 'Tidal Crab', 'Bioluminescent Worm']
        if expected > 0:
            ratio = total / expected
            if ratio > 2.0:
                _emit_event({
                    'gen': generation,
                    'text': f'{names[s]} population surge — {total} individuals ({ratio:.1f}x expected)'
                })
            elif ratio < 0.2 and total > 0:
                _emit_event({
                    'gen': generation,
                    'text': f'{names[s]} population critically low — only {total} individuals remain'
                })

# ── API FUNCTIONS (called from JS) ──

def get_global_pop(species_idx):
    total = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            total += grid[r][c]['pops'][species_idx]
    return total

def get_global_trait(species_idx):
    total_trait = 0.0
    total_pop = 0
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                total_trait += grid[r][c]['traits'][species_idx] * p
                total_pop += p
    if total_pop == 0:
        return 0.5
    return total_trait / total_pop

def get_tile_pop(r, c, species_idx):
    return grid[r][c]['pops'][species_idx]

def get_tile_trait(r, c, species_idx):
    return grid[r][c]['traits'][species_idx]

def get_map_data(species_idx):
    pops = []
    elevations = []
    max_pop = 1
    for r in range(GRID_SIZE):
        pop_row = []
        elev_row = []
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            pop_row.append(p)
            elev_row.append(grid[r][c]['elevation'])
            if p > max_pop:
                max_pop = p
        pops.append(pop_row)
        elevations.append(elev_row)
    return json.dumps({'pops': pops, 'elevations': elevations, 'max_pop': max_pop})

def get_trait_histogram(species_idx):
    """Return histogram of trait values across all tiles (weighted by pop)."""
    num_bins = 20
    bins = [0] * num_bins
    for r in range(GRID_SIZE):
        for c in range(GRID_SIZE):
            p = grid[r][c]['pops'][species_idx]
            if p > 0:
                t = grid[r][c]['traits'][species_idx]
                bin_idx = min(num_bins - 1, int(t * num_bins))
                bins[bin_idx] += p
    result = []
    for i in range(num_bins):
        result.append({'low': i/num_bins, 'high': (i+1)/num_bins, 'count': bins[i]})
    return json.dumps(result)

def get_tile_env(r, c):
    t = grid[r][c]
    return json.dumps({
        'elevation': round(t['elevation'], 3),
        'food': round(t['food'], 3),
        'water': round(t['water'], 3),
        'temp': round(t['temp'], 3)
    })

def track_tile(r, c):
    key = (r, c)
    if key not in tile_history:
        tile_history[key] = []

def untrack_tile(r, c):
    key = (r, c)
    if key in tile_history:
        del tile_history[key]

def get_tile_history(r, c):
    key = (r, c)
    return json.dumps(tile_history.get(key, []))

def get_snapshot_count():
    return len(snapshots)

def get_snapshot_generations():
    """Return list of {gen, hasEvents} for all snapshots."""
    result = []
    for s in snapshots:
        result.append({'gen': s['gen'], 'hasEvents': len(s['events']) > 0})
    return json.dumps(result)

def get_snapshot_events(idx):
    """Return events for a specific snapshot."""
    if 0 <= idx < len(snapshots):
        return json.dumps(snapshots[idx]['events'])
    return '[]'

def get_historical_map_data(snapshot_idx, species_idx):
    """Return map data from a historical snapshot."""
    if snapshot_idx < 0 or snapshot_idx >= len(snapshots):
        return json.dumps({'pops': [], 'elevations': [], 'max_pop': 1, 'gen': 0})
    snap = snapshots[snapshot_idx]
    pops = []
    elevations = []
    max_pop = 1
    stride = NUM_SPECIES
    for r in range(GRID_SIZE):
        pop_row = []
        elev_row = []
        for c in range(GRID_SIZE):
            offset = (r * GRID_SIZE + c) * stride
            p = snap['pops'][offset + species_idx]
            pop_row.append(p)
            elev_row.append(grid[r][c]['elevation'])
            if p > max_pop:
                max_pop = p
        pops.append(pop_row)
        elevations.append(elev_row)
    return json.dumps({'pops': pops, 'elevations': elevations, 'max_pop': max_pop, 'gen': snap['gen']})

def get_and_clear_events():
    global events_buffer
    out = json.dumps(events_buffer)
    events_buffer = []
    return out

<script>
// Mobile tool tray — folder tab for #panel
(function() {
  var panel = document.getElementById('panel');
  if (!panel) return;

  var tab = document.createElement('div');
  tab.className = 'tray-tab';
  tab.setAttribute('role', 'button');
  tab.innerHTML = '<span class="tray-tab-label">Data</span><span class="tray-tab-chevron">&#9650;</span>';
  document.body.appendChild(tab);

  var isOpen = false;

  function toggle(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    isOpen = !isOpen;
    panel.classList.toggle('tray-open', isOpen);
    tab.classList.toggle('tab-active', isOpen);
    requestAnimationFrame(function() {
      tab.style.bottom = isOpen ? panel.offsetHeight + 'px' : '0';
    });
  }

  tab.addEventListener('click', toggle);
  tab.addEventListener('touchend', function(e) {
    e.preventDefault();
    toggle(e);
  });

  document.addEventListener('touchend', function(e) {
    if (isOpen && !panel.contains(e.target) && !tab.contains(e.target)) toggle();
  });
  document.addEventListener('click', function(e) {
    if (isOpen && !panel.contains(e.target) && !tab.contains(e.target)) toggle();
  });

  var startY = 0;
  panel.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
  }, { passive: true });
  panel.addEventListener('touchend', function(e) {
    if (e.changedTouches[0].clientY - startY > 60 && isOpen) toggle();
  }, { passive: true });
})();
</script>
